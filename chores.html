<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Chores — Sermon Prep</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..900;1,9..40,300..900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/Sermon-Prep-Dashboard/styles.css" />
<style>
  /* ── CHORES PAGE — SPECIFIC STYLES ── */
  .main { margin-left: var(--nav-width); flex: 1; padding: 2rem 2.5rem 4rem; max-width: 900px; min-width: 0; }

  /* Button variant */
  .btn.green { background: var(--green-light); color: var(--green); border-color: var(--green-border); font-weight: 600; }
  .btn.green:hover { background: var(--green); color: white; }

  /* Section headers */
  .section-header { display: flex; align-items: center; gap: 10px; margin: 1.75rem 0 1rem; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .section-line { flex: 1; height: 0.5px; background: var(--border); }
  .section-count { font-size: 11px; background: var(--bg-secondary); color: var(--text-secondary); padding: 2px 8px; border-radius: 20px; }

  /* Weekly to-do */
  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .week-nav { display: flex; align-items: center; gap: 8px; }
  .week-nav-btn { background: none; border: 0.5px solid var(--border-md); cursor: pointer; color: var(--text-secondary); font-size: 14px; padding: 4px 9px; border-radius: var(--radius-md); font-family: var(--font); }
  .week-nav-btn:hover { background: var(--bg-secondary); }
  .week-label { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .week-today-btn { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: none; cursor: pointer; color: var(--text-secondary); font-family: var(--font); }
  .week-today-btn:hover { background: var(--bg-secondary); }
  .week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
  .day-col { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--r-lg); overflow: hidden; min-height: 120px; }
  .day-col.today { border-color: var(--blue-text); border-width: 1.5px; }
  .day-header { padding: 8px 10px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .day-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); }
  .day-date { font-size: 11px; font-weight: 600; color: var(--text-secondary); }
  .day-col.today .day-name, .day-col.today .day-date { color: var(--blue-text); }
  .day-tasks { padding: 6px; display: flex; flex-direction: column; gap: 4px; }
  .day-task { padding: 5px 7px; border-radius: var(--radius-md); font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 5px; cursor: pointer; transition: opacity 0.15s; border: 0.5px solid transparent; }
  .day-task.done { opacity: 0.45; text-decoration: line-through; }
  .day-task-check { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid currentColor; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; }
  .day-task.done .day-task-check { background: currentColor; }
  .day-task.done .day-task-check::after { content: '✓'; color: white; }
  .day-task.urgent-high { background: #eaf3de; color: #2d5a0e; border-color: #c5e0a0; }
  .day-task.urgent-mid  { background: #f3f7e8; color: #4a7a1a; border-color: #d4e8a8; }
  .day-task.urgent-low  { background: #faeeda; color: #854f0b; border-color: #f0d090; }
  .day-task.urgent-gone { background: var(--red-bg); color: var(--red-text); border-color: var(--red-text); }
  .day-task.oneoff      { background: var(--blue-bg); color: var(--blue-text); border-color: #a8c8e8; }

  /* Calendar */
  .cal-widget { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 0.5px solid var(--border); gap: 8px; }
  .cal-nav-title { font-size: 13px; font-weight: 600; flex: 1; text-align: center; }
  .cal-nav-btn { background: none; border: 0.5px solid var(--border-md); cursor: pointer; color: var(--text-secondary); font-size: 14px; padding: 3px 8px; border-radius: var(--radius-md); }
  .cal-nav-btn:hover { background: var(--bg-secondary); }
  .cal-nav-today { font-size: 11px; padding: 3px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: none; cursor: pointer; color: var(--text-secondary); font-family: var(--font); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
  .cal-day-header { text-align: center; font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; padding: 7px 2px 5px; border-bottom: 0.5px solid var(--border); }
  .cal-day { min-height: 80px; padding: 4px; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); }
  .cal-day:nth-child(7n) { border-right: none; }
  .cal-day:nth-last-child(-n+7) { border-bottom: none; }
  .cal-day.today { background: var(--blue-bg); }
  .cal-day.other-month { opacity: 0.4; }
  .cal-day-num { font-size: 10px; font-weight: 500; color: var(--text-secondary); margin-bottom: 3px; }
  .cal-day.today .cal-day-num { color: var(--blue-text); font-weight: 700; }
  .cal-event { font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 3px; margin-bottom: 2px; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .cal-event.cat-house  { background: var(--blue-bg);   color: var(--blue-text); }
  .cal-event.cat-yard   { background: var(--green-bg);  color: var(--green-text); }
  .cal-event.cat-car    { background: var(--amber-bg);  color: var(--amber-text); }
  .cal-event.cat-admin  { background: var(--purple-bg); color: var(--purple-text); }
  .cal-event.cat-family { background: #faece7; color: #993c1d; }
  .cal-event.cat-other  { background: var(--gray-bg);   color: var(--gray-text); }
  .cal-event.done-event { opacity: 0.4; text-decoration: line-through; }

  /* All chores list */
  .chore-list { display: flex; flex-direction: column; gap: 6px; }
  .chore-item { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; transition: border-color 0.15s; }
  .chore-item:hover { border-color: var(--border-md); }
  .chore-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chore-cat-dot.house  { background: var(--blue-text); }
  .chore-cat-dot.yard   { background: var(--green-text); }
  .chore-cat-dot.car    { background: var(--amber-text); }
  .chore-cat-dot.admin  { background: var(--purple-text); }
  .chore-cat-dot.family { background: #993c1d; }
  .chore-cat-dot.other  { background: var(--text-tertiary); }
  .chore-info { flex: 1; min-width: 0; }
  .chore-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .chore-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .chore-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .chore-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .chore-badge.house  { background: var(--blue-bg);   color: var(--blue-text); }
  .chore-badge.yard   { background: var(--green-bg);  color: var(--green-text); }
  .chore-badge.car    { background: var(--amber-bg);  color: var(--amber-text); }
  .chore-badge.admin  { background: var(--purple-bg); color: var(--purple-text); }
  .chore-badge.family { background: #faece7; color: #993c1d; }
  .chore-badge.other  { background: var(--gray-bg);   color: var(--gray-text); }

  .modal-actions { justify-content: space-between; }

  .error-banner { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-text); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: none; }
  .error-banner.show { display: block; }

  @media (max-width: 768px) {
    .main { margin-left: 0; padding: 1rem 1rem 4rem; max-width: 100%; }
    .stats { grid-template-columns: repeat(2,1fr); }
    .week-grid { grid-template-columns: repeat(2,1fr); gap: 6px; }
  }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzrDYUgAAbGHgQmm5PxGDh1dhWqdKp-pI",
  authDomain: "sermon-prep-dashboard.firebaseapp.com",
  projectId: "sermon-prep-dashboard",
  storageBucket: "sermon-prep-dashboard.firebasestorage.app",
  messagingSenderId: "769289223341",
  appId: "1:769289223341:web:3dc1d53e57d96b3c55da24"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
let currentUser = null;
let allChores = [];
let allOneoffs = [];
let completions = {}; // { "choreId_YYYY-MM-DD": true }
let weekOffset = 0;
let calMonthOffset = 0;
let editingChoreId = null;
let editingOneoffId = null;

const FREQ_LABELS = {
  daily:'Daily', weekly:'Weekly', biweekly:'Every 2 weeks',
  monthly:'Monthly', bimonthly:'Every 2 months', quarterly:'Every 3 months',
  biannual:'Every 6 months', yearly:'Yearly'
};
const CAT_LABELS = { house:'House', yard:'Yard', car:'Car', admin:'Admin', family:'Family', other:'Other' };
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── DATES ─────────────────────────────────────────────────────────────────────
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function toYMD(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseDate(s) { if(!s) return null; const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function getMondayOf(d) { const t=new Date(d); const dow=t.getDay(); const diff=dow===0?-6:1-dow; t.setDate(t.getDate()+diff); return t; }

// ── AUTH ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('nav-user').textContent = user.displayName || user.email;
    await loadAll();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
  }
});

window.signIn = async () => { try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); } };
window.signOut = async () => { await fbSignOut(auth); };
window.openNav = () => { document.getElementById('main-nav').classList.add('open'); document.getElementById('nav-overlay').classList.add('open'); document.body.style.overflow='hidden'; };
window.closeNav = () => { document.getElementById('main-nav').classList.remove('open'); document.getElementById('nav-overlay').classList.remove('open'); document.body.style.overflow=''; };

function setSyncStatus(state, label) { document.getElementById('sync-dot').className='sync-dot '+state; document.getElementById('sync-label').textContent=label; }
function showError(msg) { const el=document.getElementById('error-banner'); el.textContent=msg; el.classList.add('show'); }
function hideError() { document.getElementById('error-banner').classList.remove('show'); }

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  setSyncStatus('syncing','Loading...');
  try {
    const [choresSnap, oneofsSnap, compSnap] = await Promise.all([
      getDocs(collection(db,'users',currentUser.uid,'chores')),
      getDocs(collection(db,'users',currentUser.uid,'oneoffs')),
      getDoc(doc(db,'users',currentUser.uid,'meta','chore_completions'))
    ]);
    allChores = choresSnap.docs.map(d=>({id:d.id,...d.data()}));
    allOneoffs = oneofsSnap.docs.map(d=>({id:d.id,...d.data()})).filter(o=>!o.done);
    completions = compSnap.exists() ? compSnap.data() : {};
    setSyncStatus('synced','Synced');
    hideError();
    renderAll();
  } catch(e) {
    setSyncStatus('error','Error');
    showError('Could not load chores: '+e.message);
  }
}

async function saveCompletions() {
  await setDoc(doc(db,'users',currentUser.uid,'meta','chore_completions'), completions);
}

// ── SCHEDULE LOGIC ────────────────────────────────────────────────────────────
function getChoreOccurrences(chore, fromDate, toDate) {
  // Returns array of dates (as YMD strings) when this chore is due
  const dates = [];
  const start = parseDate(chore.startDate);
  if (!start) return dates;
  const freq = chore.frequency;
  const dow = parseInt(chore.dayOfWeek ?? 1); // default Monday

  let current = new Date(start);

  // Align to correct day of week for weekly/biweekly
  if (freq === 'daily') {
    current = new Date(start);
  } else {
    // Move to first occurrence of the target day of week on or after start
    while (current.getDay() !== dow) {
      current.setDate(current.getDate() + 1);
    }
  }

  const freqDays = { daily:1, weekly:7, biweekly:14, monthly:30, bimonthly:60, quarterly:90, biannual:180, yearly:365 };
  const step = freqDays[freq] || 7;

  // For monthly+ use month-based stepping
  const useMonths = ['monthly','bimonthly','quarterly','biannual','yearly'].includes(freq);
  const monthStep = { monthly:1, bimonthly:2, quarterly:3, biannual:6, yearly:12 }[freq] || 1;

  let iter = new Date(current);
  let safety = 0;

  while (iter <= toDate && safety < 500) {
    safety++;
    if (iter >= fromDate) dates.push(toYMD(iter));
    if (useMonths) {
      iter = new Date(iter);
      iter.setMonth(iter.getMonth() + monthStep);
    } else {
      iter = new Date(iter);
      iter.setDate(iter.getDate() + step);
    }
  }
  return dates;
}

function getWeekOccurrences(weekMonday) {
  // Get all chore occurrences for a given week
  const weekEnd = new Date(weekMonday); weekEnd.setDate(weekMonday.getDate() + 6);
  const result = []; // [{chore, date}]
  allChores.forEach(chore => {
    const dates = getChoreOccurrences(chore, weekMonday, weekEnd);
    dates.forEach(d => result.push({chore, date:d}));
  });
  // Add one-offs due this week
  allOneoffs.forEach(o => {
    if (o.dueDate >= toYMD(weekMonday) && o.dueDate <= toYMD(weekEnd)) {
      result.push({chore:o, date:o.dueDate, isOneoff:true});
    }
  });
  return result;
}

function isCompleted(choreId, dateStr) {
  return !!completions[`${choreId}_${dateStr}`];
}

async function toggleComplete(choreId, dateStr) {
  const key = `${choreId}_${dateStr}`;
  if (completions[key]) delete completions[key];
  else completions[key] = true;
  await saveCompletions();
  renderAll();
}

// ── RENDER ALL ─────────────────────────────────────────────────────────────────
function renderAll() {
  updateStats();
  renderWeekGrid();
  renderCalendar();
  renderChoresList();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const mon = getMondayOf(today());
  const weekOccs = getWeekOccurrences(mon);
  const doneThisWeek = weekOccs.filter(o=>isCompleted(o.chore.id, o.date)).length;
  const pendingOneoffs = allOneoffs.length;

  document.getElementById('stat-total').textContent = allChores.length;
  document.getElementById('stat-week').textContent = weekOccs.length;
  document.getElementById('stat-done').textContent = doneThisWeek;
  document.getElementById('stat-oneoffs').textContent = pendingOneoffs;
}

// ── WEEK GRID ─────────────────────────────────────────────────────────────────
window.weekPrev = () => { weekOffset--; renderWeekGrid(); };
window.weekNext = () => { weekOffset++; renderWeekGrid(); };
window.weekReset = () => { weekOffset=0; renderWeekGrid(); };

function renderWeekGrid() {
  const base = getMondayOf(today());
  const monday = new Date(base); monday.setDate(base.getDate() + weekOffset*7);
  const todayStr = toYMD(today());

  // Week label
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  document.getElementById('week-label').textContent =
    `${monday.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${sunday.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;

  // Today's day of week position (0=Mon ... 6=Sun)
  const todayDow = today().getDay()===0?6:today().getDay()-1;
  const isCurrentWeek = weekOffset===0;

  const weekOccs = getWeekOccurrences(monday);

  let html = '';
  for (let i=0; i<7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const dateStr = toYMD(d);
    const isToday = dateStr===todayStr;
    const dayOccs = weekOccs.filter(o=>o.date===dateStr);

    // Determine urgency class for tasks
    // daysLeft = days remaining in week (from today)
    const daysLeft = isCurrentWeek ? (6-todayDow) : 6;
    let urgencyClass = 'urgent-high';
    if (isCurrentWeek) {
      if (i < todayDow) urgencyClass = 'urgent-gone'; // past
      else if (daysLeft >= 4) urgencyClass = 'urgent-high';
      else if (daysLeft >= 2) urgencyClass = 'urgent-mid';
      else urgencyClass = 'urgent-low';
    }

    const taskHtml = dayOccs.map(o => {
      const done = isCompleted(o.chore.id, dateStr);
      const cls = o.isOneoff ? 'oneoff' : urgencyClass;
      return `<div class="day-task ${cls} ${done?'done':''}" onclick="toggleComplete('${o.chore.id}','${dateStr}')">
        <div class="day-task-check"></div>
        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${o.chore.name||o.chore.taskName||'Task'}</span>
      </div>`;
    }).join('');

    html += `<div class="day-col ${isToday?'today':''}">
      <div class="day-header">
        <span class="day-name">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i]}</span>
        <span class="day-date">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
      </div>
      <div class="day-tasks">${taskHtml || `<span style="font-size:10px;color:var(--text-tertiary);padding:4px 2px;">Clear</span>`}</div>
    </div>`;
  }
  document.getElementById('week-grid').innerHTML = html;
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
window.calPrev = () => { calMonthOffset--; renderCalendar(); };
window.calNext = () => { calMonthOffset++; renderCalendar(); };
window.calReset = () => { calMonthOffset=0; renderCalendar(); };

function renderCalendar() {
  const now = today();
  const viewDate = new Date(now.getFullYear(), now.getMonth()+calMonthOffset, 1);
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  document.getElementById('cal-title').textContent = `${MONTHS_FULL[month]} ${year}`;

  const firstDay = new Date(year,month,1);
  const lastDay = new Date(year,month+1,0);
  // Start from Monday before first day
  const startDow = firstDay.getDay()===0?6:firstDay.getDay()-1;
  const calStart = new Date(firstDay); calStart.setDate(firstDay.getDate()-startDow);
  const calEnd = new Date(lastDay);
  const endDow = lastDay.getDay()===0?6:lastDay.getDay()-1;
  calEnd.setDate(lastDay.getDate()+(6-endDow));

  // Get all occurrences in this range
  const occsByDate = {};
  allChores.forEach(chore => {
    getChoreOccurrences(chore, calStart, calEnd).forEach(d => {
      if (!occsByDate[d]) occsByDate[d]=[];
      occsByDate[d].push({chore, isOneoff:false});
    });
  });
  allOneoffs.forEach(o => {
    if (!occsByDate[o.dueDate]) occsByDate[o.dueDate]=[];
    occsByDate[o.dueDate].push({chore:o, isOneoff:true});
  });

  const todayStr = toYMD(today());
  let html = '';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{html+=`<div class="cal-day-header">${d}</div>`;});

  let iter = new Date(calStart);
  while (iter <= calEnd) {
    const dateStr = toYMD(iter);
    const isToday = dateStr===todayStr;
    const isOtherMonth = iter.getMonth()!==month;
    const occs = occsByDate[dateStr]||[];
    const evHtml = occs.slice(0,3).map(o=>{
      const done = isCompleted(o.chore.id, dateStr);
      const cat = o.chore.category||o.chore.category||'other';
      return `<div class="cal-event cat-${cat} ${done?'done-event':''}">${o.chore.name||o.chore.taskName||'Task'}</div>`;
    }).join('');
    const more = occs.length>3?`<div style="font-size:9px;color:var(--text-tertiary);padding:0 2px;">+${occs.length-3} more</div>`:'';
    html+=`<div class="cal-day ${isToday?'today':''} ${isOtherMonth?'other-month':''}">
      <div class="cal-day-num">${iter.getDate()}</div>
      ${evHtml}${more}
    </div>`;
    iter.setDate(iter.getDate()+1);
  }
  document.getElementById('cal-grid').innerHTML = html;
}

// ── CHORES LIST ───────────────────────────────────────────────────────────────
function renderChoresList() {
  document.getElementById('all-chores-count').textContent = allChores.length + allOneoffs.length;
  const el = document.getElementById('chores-list');
  if (allChores.length===0 && allOneoffs.length===0) {
    el.innerHTML = `<div class="empty-state"><i class="ti ti-home"></i>No chores yet — click "Add chore" to get started.</div>`;
    return;
  }
  const rows = [
    ...allChores.map(c=>({...c, isOneoff:false})),
    ...allOneoffs.map(o=>({...o, name:o.taskName, isOneoff:true}))
  ];
  el.innerHTML = `<div class="chore-list">${rows.map(c=>`
    <div class="chore-item">
      <div class="chore-cat-dot ${c.category||'other'}"></div>
      <div class="chore-info">
        <div class="chore-name">${c.name||'Unnamed'}</div>
        <div class="chore-meta">${c.isOneoff?`One-off · Due ${c.dueDate||'?'}`:FREQ_LABELS[c.frequency]||c.frequency} · ${CAT_LABELS[c.category]||c.category||'Other'}${c.notes?` · ${c.notes}`:''}</div>
      </div>
      <span class="chore-badge ${c.category||'other'}">${CAT_LABELS[c.category]||'Other'}</span>
      <div class="chore-actions">
        <button class="icon-btn" onclick="${c.isOneoff?`openEditOneoff('${c.id}')`:`openEditChore('${c.id}')`}" title="Edit"><i class="ti ti-edit"></i></button>
      </div>
    </div>`).join('')}</div>`;
}

  document.getElementById('f-dow-wrap').style.display = showDow?'block':'none';
});

  document.getElementById('chore-modal-title').textContent='Add chore';

  document.getElementById('f-chore-cat').value='house';
  document.getElementById('f-chore-freq').value='weekly';
  document.getElementById('f-chore-dow').value='1';
  document.getElementById('f-chore-start').value=toYMD(today());
  document.getElementById('f-chore-notes').value='';
  document.getElementById('chore-delete-btn').style.display='none';
  document.getElementById('f-dow-wrap').style.display='block';
  document.getElementById('chore-modal').classList.add('open');
};

window.openEditChore = function(id) {
  const c=allChores.find(x=>x.id===id);
  if(!c) return;
  editingChoreId=id;
  document.getElementById('chore-modal-title').textContent='Edit chore';
  document.getElementById('f-chore-name').value=c.name||'';
  document.getElementById('f-chore-cat').value=c.category||'house';
  document.getElementById('f-chore-freq').value=c.frequency||'weekly';
  document.getElementById('f-chore-dow').value=c.dayOfWeek??1;
  document.getElementById('f-chore-start').value=c.startDate||toYMD(today());
  document.getElementById('f-chore-notes').value=c.notes||'';
  document.getElementById('chore-delete-btn').style.display='flex';
  const showDow=['daily','weekly','biweekly'].includes(c.frequency||'weekly');
  document.getElementById('f-dow-wrap').style.display=showDow?'block':'none';
  document.getElementById('chore-modal').classList.add('open');
};

window.closeChoreModal = () => document.getElementById('chore-modal').classList.remove('open');

window.deleteCurrentChore = async function() {
  if(!editingChoreId) return;
  await deleteDoc(doc(db,'users',currentUser.uid,'chores',editingChoreId));
  allChores=allChores.filter(c=>c.id!==editingChoreId);
  window.closeChoreModal();
  renderAll();
};

window.saveChore = async function() {
  const name=document.getElementById('f-chore-name').value.trim();
  if(!name){alert('Please enter a chore name.');return;}
  const btn=document.getElementById('chore-save-btn');
  btn.textContent='Saving...';btn.disabled=true;
  const freq=document.getElementById('f-chore-freq').value;
  const chore = {
    id: editingChoreId||'c'+Date.now(),
    name,
    category: document.getElementById('f-chore-cat').value,
    frequency: freq,
    dayOfWeek: ['daily','weekly','biweekly'].includes(freq)?parseInt(document.getElementById('f-chore-dow').value):1,
    startDate: document.getElementById('f-chore-start').value,
    notes: document.getElementById('f-chore-notes').value.trim()
  };
  try {
    await setDoc(doc(db,'users',currentUser.uid,'chores',chore.id),chore);
    if(editingChoreId){const i=allChores.findIndex(c=>c.id===editingChoreId);if(i>=0)allChores[i]=chore;}
    else allChores.push(chore);
    window.closeChoreModal();
    renderAll();
    setSyncStatus('synced','Saved ✓');
  } catch(e){showError('Could not save: '+e.message);}
  btn.textContent='Save chore';btn.disabled=false;
};
