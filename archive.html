<style>
  /* ── ARCHIVE PAGE — SPECIFIC STYLES ── */
  .main { padding: 1.25rem 2rem 4rem; min-width: 0; }

  /* Stat cards */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stats-grid .stat-card { display: block; background: var(--white); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); padding: 16px 18px; }
  .stat-label, .stat-card-label { display: block; font-size: 11px; font-weight: 600; color: var(--stone-light); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-num, .stat-number, .stat-value { display: block; font-size: 28px; font-weight: 800; line-height: 1; color: var(--ink); font-family: var(--font); }
  .stat-sub { font-size: 11px; color: var(--stone-light); margin-top: 2px; }

  /* Filters */
  .filter-bar { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; box-shadow: var(--shadow-sm); }
  .filter-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
  .filter-label { font-size: 11px; font-weight: 500; color: var(--stone); }
  .filter-input { padding: 8px 14px; border: 1px solid var(--border); border-radius: 100px; background: var(--warm-bg); color: var(--ink); font-family: var(--font); font-size: 13px; outline: none; width: 100%; }
  select.filter-input { border-radius: var(--r-lg); padding: 6px 12px; }
  .filter-input:focus { border-color: var(--brand); }
  .filter-search-group { flex: 2; min-width: 200px; }
  .filter-clear { padding: 6px 14px; border: 1px solid var(--border-md); border-radius: 100px; background: transparent; color: var(--stone); font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; align-self: flex-end; display: flex; align-items: center; gap: 5px; }
  .filter-clear:hover { background: var(--warm-bg); }

  /* Books filter */
  .books-bar { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 12px 16px; margin-bottom: 1.25rem; box-shadow: var(--shadow-sm); }
  .books-label { font-size: 11px; font-weight: 600; color: var(--stone); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .books-label span { font-size: 11px; color: var(--stone-light); font-weight: 400; }
  .books-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .book-pill { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 100px; border: 1px solid var(--border-md); background: var(--warm-bg); color: var(--stone); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .book-pill:hover { border-color: var(--brand); color: var(--brand); }
  .book-pill.active { background: var(--brand); color: white; border-color: var(--brand); }

  .results-label { font-size: 12px; color: var(--stone-light); margin-bottom: 10px; }

  /* Archive cards */
  .archive-list { display: flex; flex-direction: column; gap: 8px; }
  .archive-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; display: flex; align-items: flex-start; gap: 14px; box-shadow: var(--shadow-sm); }
  .archive-card:hover { border-color: var(--border-md); }
  .archive-date-col { flex-shrink: 0; width: 54px; text-align: center; background: var(--warm-bg); border-radius: var(--r-lg); padding: 6px 4px; }
  .archive-date-month { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--stone-light); }
  .archive-date-day { font-size: 20px; font-weight: 600; color: var(--ink); line-height: 1.1; }
  .archive-date-year { font-size: 10px; color: var(--stone-light); }
  .archive-content { flex: 1; min-width: 0; }
  .archive-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
  .archive-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .archive-text { font-size: 12px; color: var(--stone); display: flex; align-items: center; gap: 3px; }
  .archive-text i { font-size: 12px; }
  .archive-badge { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 100px; }
  .archive-badge.series  { background: var(--blue-bg);  color: var(--blue-text); }
  .archive-badge.context { background: var(--warm-bg);  color: var(--stone); border: 1px solid var(--border); }
  .archive-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .doc-link { font-size: 11px; color: var(--stone); display: flex; align-items: center; gap: 4px; text-decoration: none; padding: 4px 10px; border: 1px solid var(--border-md); border-radius: 100px; white-space: nowrap; }

    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .filter-bar { flex-direction: column; align-items: stretch; }
    .filter-group { min-width: 0; }
    .filter-clear { align-self: flex-start; }

function detectBook(textStr) {
  if (!textStr) return null;
  const normalized = textStr.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').trim();
  // Try full name match first
  for (const book of BIBLE_BOOKS) {
    if (normalized.startsWith(book.name.toLowerCase())) return book.name;
  }
  // Try abbreviation match — word at start
  const firstWord = normalized.split(/[\s:]/)[0];
  // Handle numbered books like "1cor", "2tim"
  const firstTwo = normalized.split(/[\s:]/)[0] + (normalized.split(/[\s:]/)[1] || '');
  for (const book of BIBLE_BOOKS) {
    for (const abbr of book.abbr) {
      if (firstWord === abbr || firstTwo.replace(/\s/,'') === abbr) return book.name;
    }
  }
  return null;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    const navAvatar = document.getElementById('nav-avatar');
    if (navAvatar) navAvatar.textContent = (user.displayName || user.email || '?').charAt(0).toUpperCase();
    buildMobileDrawer(); injectHamburger();
    const dName = document.getElementById('drawer-name'); if (dName) dName.textContent = user.displayName || user.email;
    const dUser = document.getElementById('drawer-user-name'); if (dUser) dUser.textContent = user.displayName || user.email;
    const dAvatar = document.getElementById('drawer-avatar');
    if (dAvatar) {
      if (user.photoURL) {
        dAvatar.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" referrerpolicy="no-referrer"/>`;
        dAvatar.style.background = 'none';
      } else {
        dAvatar.textContent = (user.displayName||user.email||'?')[0].toUpperCase();
      }
    }
    try {
      const profileSnap = await getDoc(doc(db, 'users', user.uid, 'meta', 'profile'));
      if (profileSnap.exists() && (profileSnap.data().role === 'admin' || profileSnap.data().role === 'family')) {
        const adminNav = document.getElementById('admin-nav-section');
        if (adminNav) adminNav.style.display = 'block';
      }
    } catch(e) { console.error('Role check failed:', e); }
    await loadArchive();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
  }
});

window.signIn = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    const err = document.getElementById('login-error');
    if (err) { err.style.display = 'block'; err.textContent = 'Sign-in failed: ' + e.message; }
    console.error(e);
  }
};
window.signOut = async () => { await fbSignOut(auth); };

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot '+state;
  document.getElementById('sync-label').textContent = label;
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
window.loadArchive = async function() {
  setSyncStatus('syncing','Loading...');
  try {
    const snap = await getDocs(collection(db, 'users', currentUser.uid, 'sermons'));
    allSermons = snap.docs
      .map(d => ({id: d.id, ...d.data()}))
      .filter(s => s.status === 'completed' && s.date)
      .sort((a,b) => b.date.localeCompare(a.date));
    setSyncStatus('synced','Synced');
    updateStats();
    buildFilters();
    buildBooksFilter();
    applyFilters();
  } catch(e) {
    setSyncStatus('error','Error');
    document.getElementById('archive-list').innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i>Could not load archive.</div>`;
  }
};

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const total = allSermons.length;
  const thisYear = new Date().getFullYear();
  const yearCount = allSermons.filter(s => s.date?.startsWith(String(thisYear))).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-year').textContent = yearCount;

  // Top 2 contexts
  const ctxCounts = {};
  allSermons.forEach(s => { if (s.context) ctxCounts[s.context] = (ctxCounts[s.context]||0)+1; });
  const sorted = Object.entries(ctxCounts).sort((a,b)=>b[1]-a[1]);

  if (sorted[0]) {
    document.getElementById('stat-ctx1-label').textContent = sorted[0][0];
    document.getElementById('stat-ctx1').textContent = sorted[0][1];
    document.getElementById('stat-ctx1-sub').textContent = `sermon${sorted[0][1]!==1?'s':''}`;
  } else {
    document.getElementById('stat-ctx1-label').textContent = 'Top context';
    document.getElementById('stat-ctx1').textContent = '—';
  }
  if (sorted[1]) {
    document.getElementById('stat-ctx2-label').textContent = sorted[1][0];
    document.getElementById('stat-ctx2').textContent = sorted[1][1];
    document.getElementById('stat-ctx2-sub').textContent = `sermon${sorted[1][1]!==1?'s':''}`;
  } else {
    document.getElementById('stat-ctx2-label').textContent = '2nd context';
    document.getElementById('stat-ctx2').textContent = '—';
  }
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const contexts = [...new Set(allSermons.map(s=>s.context).filter(Boolean))].sort();
  const series = [...new Set(allSermons.map(s=>s.series).filter(Boolean))].sort();
  const years = [...new Set(allSermons.map(s=>s.date?.substring(0,4)).filter(Boolean))].sort().reverse();

  document.getElementById('filter-context').innerHTML =
    '<option value="">All contexts</option>' + contexts.map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('filter-series').innerHTML =
    '<option value="">All series</option>' + series.map(s=>`<option value="${s}">${s}</option>`).join('');
  document.getElementById('filter-year').innerHTML =
    '<option value="">All years</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
}

// ── BOOKS FILTER ──────────────────────────────────────────────────────────────
function buildBooksFilter() {
  // Find which books have been preached from
  const preachedBooks = new Set();
  allSermons.forEach(s => {
    const book = detectBook(s.text);
    if (book) preachedBooks.add(book);
  });

  if (preachedBooks.size === 0) {
    document.getElementById('books-bar').style.display = 'none';
    return;
  }

  document.getElementById('books-bar').style.display = 'block';
  const booksInOrder = BIBLE_BOOKS.filter(b => preachedBooks.has(b.name));

  document.getElementById('books-pills').innerHTML = booksInOrder.map(book =>
    `<span class="book-pill ${book.testament} ${activeBook===book.name?'active':''}"
      onclick="toggleBook('${book.name}')">${book.short}</span>`
  ).join('');
}

window.toggleBook = function(bookName) {
  activeBook = activeBook === bookName ? null : bookName;
  buildBooksFilter();
  applyFilters();
};

window.applyFilters = function() {
  const search = document.getElementById('filter-search').value.toLowerCase().trim();
  const context = document.getElementById('filter-context').value;
  const series = document.getElementById('filter-series').value;
  const year = document.getElementById('filter-year').value;

  const filtered = allSermons.filter(s => {
    if (context && s.context !== context) return false;
    if (series && s.series !== series) return false;
    if (year && !s.date?.startsWith(year)) return false;
    if (activeBook && detectBook(s.text) !== activeBook) return false;
    if (search) {
      const hay = `${s.title} ${s.text} ${s.series} ${s.context}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('results-label').textContent =
    filtered.length === allSermons.length
      ? `${allSermons.length} sermon${allSermons.length!==1?'s':''}`
      : `${filtered.length} of ${allSermons.length} sermons`;

  renderArchive(filtered);
};

window.clearFilters = function() {
  document.getElementById('filter-search').value = '';
  document.getElementById('filter-context').value = '';
  document.getElementById('filter-series').value = '';
  document.getElementById('filter-year').value = '';
  activeBook = null;
  buildBooksFilter();
  applyFilters();
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderArchive(sermons) {
  const el = document.getElementById('archive-list');
  if (sermons.length === 0) {
    el.innerHTML = allSermons.length === 0
      ? `<div class="empty-state"><i class="ti ti-archive"></i>No completed sermons yet. Sermons marked as Completed will appear here.</div>`
      : `<div class="empty-state"><i class="ti ti-search"></i>No sermons match your filters.</div>`;
    return;
  }

  el.innerHTML = sermons.map(s => {
    const [y,m,d] = (s.date||'').split('-').map(Number);
    const date = new Date(y,m-1,d);
    const month = date.toLocaleDateString('en-US',{month:'short'}).toUpperCase();
    const day = date.getDate();
    const year = date.getFullYear();

    return `<div class="archive-card">
      <div class="archive-date-col">
        <div class="archive-date-month">${month}</div>
        <div class="archive-date-day">${day}</div>
        <div class="archive-date-year">${year}</div>
      </div>
      <div class="archive-content">
        <div class="archive-title">${s.title||'Untitled'}</div>
        <div class="archive-meta">
          ${s.text?`<span class="archive-text"><i class="ti ti-book-2"></i>${s.text}</span>`:''}
          ${s.series?`<span class="archive-badge series">${s.series}</span>`:''}
          ${s.context?`<span class="archive-badge context">${s.context}</span>`:''}
        </div>
      </div>
      <div class="archive-actions">
        ${s.doc?`<a class="doc-link" href="${s.doc}" target="_blank"><i class="ti ti-file-text"></i> Sermon doc</a>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── MOBILE DRAWER (matches dashboard design) ──────────────────────────────
function buildMobileDrawer() {
  if (document.getElementById('mobile-drawer')) return;
  const nav = [
    ['/Sermon-Prep-Dashboard/','🏠 Dashboard',false],
    ['/Sermon-Prep-Dashboard/color.html','🎨 Color',false],
    ['/Sermon-Prep-Dashboard/accountability.html','👥 Accountability',false],
    ['/Sermon-Prep-Dashboard/archive.html','📚 Archive',true],
    ['/Sermon-Prep-Dashboard/settings.html','⚙️ Settings',false],
  ];
  const links = nav.map(([href,label,active])=>
    `<a href="${href}" style="display:flex;align-items:center;gap:12px;padding:12px 18px;font-size:14px;font-weight:${active?'600':'500'};color:${active?'var(--green)':'var(--stone)'};${active?'background:var(--green-light);':''}text-decoration:none;">${label}</a>`
  ).join('');
  document.body.insertAdjacentHTML('beforeend',`
<div id="mobile-drawer-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;" onclick="closeMobileDrawer()"></div>
<div id="mobile-drawer" style="position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--white);z-index:300;transform:translateX(-100%);transition:transform 0.25s ease;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,0.15);">
  <div style="padding:20px 18px 16px;border-bottom:1px solid var(--border);background:#111009;">
    <div style="font-size:18px;font-weight:800;color:white;letter-spacing:-0.03em;">Archive</div>
    <div id="drawer-user-name" style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;"></div>
  </div>
  <div style="padding:10px 0;flex:1;overflow-y:auto;">
    <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--stone-light);padding:10px 18px 4px;">Pages</div>
    ${links}
  </div>
  <div style="padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;">
    <div id="drawer-avatar" style="width:32px;height:32px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;overflow:hidden;">?</div>
    <div style="flex:1;min-width:0;">
      <div id="drawer-name" style="font-size:12px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
    </div>
    <button onclick="signOut()" style="background:none;border:none;cursor:pointer;padding:6px;color:var(--stone-light);font-size:16px;border-radius:6px;display:flex;align-items:center;flex-shrink:0;" title="Sign out"><i class="ti ti-logout"></i></button>
  </div>
</div>`);
}
function injectHamburger() {
  if (window.innerWidth > 768) return;
  const topbar = document.querySelector('.topbar-wrap .topbar');
  if (topbar && !topbar.querySelector('#mobile-hamburger')) {
    const btn = document.createElement('button');
    btn.id = 'mobile-hamburger';
    btn.style.cssText = 'width:36px;height:36px;border-radius:10px;background:var(--white);border:1px solid var(--border-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;flex-shrink:0;';
    btn.innerHTML = '<div style="width:16px;height:1.5px;background:var(--ink);border-radius:2px;"></div><div style="width:16px;height:1.5px;background:var(--ink);border-radius:2px;"></div><div style="width:16px;height:1.5px;background:var(--ink);border-radius:2px;"></div>';
    btn.onclick = () => window.openMobileDrawer();
    topbar.prepend(btn);
  }
}
window.openMobileDrawer = () => {
  const d=document.getElementById('mobile-drawer'), o=document.getElementById('mobile-drawer-overlay');
  if(d) d.style.transform='translateX(0)'; if(o) o.style.display='block';
  document.body.style.overflow='hidden';
};
window.closeMobileDrawer = () => {
  const d=document.getElementById('mobile-drawer'), o=document.getElementById('mobile-drawer-overlay');
  if(d) d.style.transform='translateX(-100%)'; if(o) o.style.display='none';
  document.body.style.overflow='';
};
document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeMobileDrawer(); });
window.addEventListener('DOMContentLoaded', () => { buildMobileDrawer(); injectHamburger(); });
</script>
</body>
