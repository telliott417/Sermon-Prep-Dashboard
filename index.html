<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --gray-bg: #292524; --gray-text: #a8a29e;
    }
  }
  html { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); font-size: 16px; }
  body { min-height: 100vh; }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; }

  /* ── NAV ── */
  .nav { width: var(--nav-width); flex-shrink: 0; background: var(--bg); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.25s ease; }
  .nav-logo { padding: 0 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1rem; }

  .todo-advance:hover { opacity: 0.8; }

  .urgency-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .urgency-urgent { background: var(--red-bg); color: var(--red-text); }

  .quick-advance { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: var(--blue-bg); color: var(--blue-text); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 3px; font-family: var(--font); }

  .chevron { font-size: 15px; color: var(--text-tertiary); transition: transform 0.2s; display: inline-block; flex-shrink: 0; }

  .sermon-body { border-top: 0.5px solid var(--border); padding: 14px; display: none; }

  .cal-widget { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }

 @media (max-width: 768px) {

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzrDYUgAAbGHgQmm5PxGDh1dhWqdKp-pI",
  authDomain: "sermon-prep-dashboard.firebaseapp.com",
  projectId: "sermon-prep-dashboard",
  storageBucket: "sermon-prep-dashboard.firebasestorage.app",
  messagingSenderId: "769289223341",
  appId: "1:769289223341:web:3dc1d53e57d96b3c55da24"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
let currentUser = null;

const DEFAULT_STAGES = [
  { key: 'study',   label: 'Study',        dueDay: 2, weeksBack: 2 },
  { key: 'idea',    label: 'Main idea',     dueDay: 2, weeksBack: 2 },
  { key: 'outline', label: 'Outline',       dueDay: 3, weeksBack: 2 },
  { key: 'draft',   label: 'Draft',         dueDay: 2, weeksBack: 1 },
  { key: 'final',   label: 'Final',         dueDay: 3, weeksBack: 1 },
  { key: 'run',     label: 'Run-through',   dueDay: 4, weeksBack: 1 },
];
const DEFAULT_CONTEXTS = ['Salt','Candeo','Youth'];

let STAGES = [];
let STATUS_ORDER = [];
let STATUS_LABELS = {};
let STATUS_CLASSES = {};
let userContexts = [...DEFAULT_CONTEXTS];

const STAGE_CLASS_MAP = {
  'not-started':'sp-not-started','study':'sp-study','idea':'sp-idea',
  'outline':'sp-outline','draft':'sp-draft','final':'sp-final',
  'run':'sp-run','completed':'sp-completed'
};

function buildStagesFromSettings(settingsStages) {
  const middle = settingsStages || DEFAULT_STAGES;
  STAGES = [
    { key: 'not-started', label: 'Not yet started', dueDay: null, weeksBack: null },
    ...middle,
    { key: 'completed', label: 'Completed', dueDay: 0, weeksBack: 0 },
  ];
  STATUS_ORDER = STAGES.map(s => s.key);
  STATUS_LABELS = {};
  STATUS_CLASSES = {};
  STAGES.forEach(s => {
    STATUS_LABELS[s.key] = s.label;
    STATUS_CLASSES[s.key] = STAGE_CLASS_MAP[s.key] || 'sp-study';
  });
}

let editingId = null;
let allSermons = [];
let openCards = new Set();
let calWeekOffset = 0;

// ── AUTH ──────────────────────────────────────────────────────────────────────
const loginScreen = document.getElementById('login-screen');

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    loginScreen.style.display = 'none';
    document.getElementById('nav-user').textContent = user.displayName || user.email;
    await loadUserSettings();
    loadSermons();
  } else {
    currentUser = null;
    loginScreen.style.display = 'flex';
  }
});

window.signIn = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    err.textContent = 'Sign-in failed: ' + e.message;
  }
};

window.signOut = async () => {
  await fbSignOut(auth);
};

// ── NAV DRAWER ────────────────────────────────────────────────────────────────
window.openNav = function() {
  document.getElementById('main-nav').classList.add('open');
  document.getElementById('nav-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.closeNav = function() {
  document.getElementById('main-nav').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('open');
  document.body.style.overflow = '';
};

window.goAddColor = function() {
  window.location.href = '/Sermon-Prep-Dashboard/color.html?capture=1';
};

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(str) { if (!str) return null; const [y,m,d] = str.split('-').map(Number); return new Date(y,m-1,d); }
function toYMD(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function daysUntil(d) { return Math.round((d - today()) / 86400000); }
function formatDate(d) { return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function formatDateFull(d) { return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }

function getStageDueDate(sermonDateStr, stageKey) {
  const stage = STAGES.find(s=>s.key===stageKey);
  if (!stage||stage.dueDay===null) return null;
  const sermonDate = parseDate(sermonDateStr);

  // Start from sermon date and go back weeksBack * 7 days
  const base = new Date(sermonDate);
  base.setDate(sermonDate.getDate() - (stage.weeksBack * 7));

  // Now find the most recent occurrence of dueDay on or before base
  // dueDay: 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
  const baseDow = base.getDay();
  let diff = baseDow - stage.dueDay;
  if (diff < 0) diff += 7;
  const result = new Date(base);
  result.setDate(base.getDate() - diff);

    // Safety check — only final, run-through, and completed can land on sermon date
  if (result >= sermonDate && stage.key !== 'completed' && stage.key !== 'run' && stage.key !== 'final') {
    result.setDate(result.getDate() - 7);
  }

  return result;
}

function isBehind(sermon) {
  if (sermon.status==='completed'||sermon.status==='not-started') return false;
  const due = getStageDueDate(sermon.date, sermon.status);
  if (!due) return false;
  return daysUntil(due) < 0;
}
function getProgressPct(status) {
  if (status === 'not-started' || status === 'study') return 0;
  const idx = STATUS_ORDER.indexOf(status);
  return idx<0 ? 0 : Math.round((idx/(STATUS_ORDER.length-1))*100);
}
function isActive(s) {
  if (s.status==='completed') return false;
  if (s.status!=='not-started') return true;
  return daysUntil(parseDate(s.date)) <= 21;
}
// ── USER SETTINGS ─────────────────────────────────────────────────────────────
async function loadUserSettings() {
  try {
    const snap = await getDoc(doc(db, 'users', currentUser.uid, 'meta', 'settings'));
    if (snap.exists()) {
      const s = snap.data();
      buildStagesFromSettings(s.stages);
      if (s.contexts && s.contexts.length > 0) userContexts = s.contexts;
    } else {
      buildStagesFromSettings(DEFAULT_STAGES);
    }
  } catch(e) {
    console.error('Could not load settings:', e);
    buildStagesFromSettings(DEFAULT_STAGES);
  }
}
// ── SYNC ─────────────────────────────────────────────────────────────────────
function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot '+state;
  document.getElementById('sync-label').textContent = label;
}
function showError(msg) { const el=document.getElementById('error-banner'); el.textContent=msg; el.classList.add('show'); }
function hideError() { document.getElementById('error-banner').classList.remove('show'); }

// ── FIRESTORE DATA ────────────────────────────────────────────────────────────
function sermonsRef() {
  return collection(db, 'users', currentUser.uid, 'sermons');
}

window.loadSermons = async function() {
  if (!currentUser) return;
  setSyncStatus('syncing','Loading...');
  document.getElementById('active-section').innerHTML = `<div class="loading-state"><i class="ti ti-loader"></i>Loading...</div>`;
  try {
    const snap = await getDocs(sermonsRef());
    allSermons = snap.docs.map(d => ({id: d.id, ...d.data()}));
    allSermons.sort((a,b)=>a.date.localeCompare(b.date));
    hideError();
    setSyncStatus('synced','Synced');
    openCards.clear();
    renderAll();
  } catch(e) {
    setSyncStatus('error','Error');
    showError('Could not load sermons. '+e.message);
    document.getElementById('active-section').innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i>Could not load data.</div>`;
  }
};

async function saveSermonToDb(sermon) {
  setSyncStatus('syncing','Saving...');
  try {
    await setDoc(doc(db, 'users', currentUser.uid, 'sermons', sermon.id), sermon);
    setSyncStatus('synced','Saved ✓');
    hideError();
  } catch(e) {
    setSyncStatus('error','Save failed');
    showError('Could not save: '+e.message);
  }
}

async function deleteSermonFromDb(id) {
  setSyncStatus('syncing','Deleting...');
  try {
    await deleteDoc(doc(db, 'users', currentUser.uid, 'sermons', id));
    setSyncStatus('synced','Deleted ✓');
    hideError();
  } catch(e) {
    setSyncStatus('error','Delete failed');
    showError('Could not delete: '+e.message);
  }
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function renderStatusPill(status) {
  return `<span class="status-pill ${STATUS_CLASSES[status]||''}">${STATUS_LABELS[status]||status}</span>`;
}
function getUrgencyClass(sermon) {
  if (sermon.status==='completed'||sermon.status==='not-started') return 'urgency-far';
  const idx = STATUS_ORDER.indexOf(sermon.status);
  if (idx<0) return 'urgency-far';
  const due = getStageDueDate(sermon.date, STAGES[idx].key);
  if (!due) return 'urgency-far';
  const d = daysUntil(due);
  if (d<0||d<=3) return 'urgency-urgent';
  if (d<=7) return 'urgency-soon';
  if (d<=14) return 'urgency-ok';
  return 'urgency-far';
}
function getUrgencyLabel(sermon) {
  const d = daysUntil(parseDate(sermon.date));
  if (d<0) return `${Math.abs(d)}d ago`;
  if (d===0) return 'Today!';
  if (d===1) return 'Tomorrow';
  return `${d}d away`;
}
function renderStages(sermon) {
  const statusIdx = STATUS_ORDER.indexOf(sermon.status);
  return STAGES.filter(s=>s.dueDay!==null).map(stage => {
    const i = STATUS_ORDER.indexOf(stage.key);
    const due = getStageDueDate(sermon.date, stage.key);
    if (!due) return '';
    const d = daysUntil(due);
    let cls = '';
    if (i<statusIdx) cls='stage-done';
    else if (i===statusIdx) cls=d<0?'stage-overdue':'stage-active';
    return `<div class="stage ${cls}">
      <div class="stage-name">${stage.label}</div>
      <div class="stage-date">${formatDate(due)}</div>
    </div>`;
  }).join('');
}

function renderSermonCard(s) {
  const pct = getProgressPct(s.status);
  const behind = isBehind(s);
  const isOpen = openCards.has(s.id);
  const nextStage = STATUS_ORDER[STATUS_ORDER.indexOf(s.status)+1];
  const cardClass = 'sermon-card'+(behind?' behind':'');
  const docLink = s.doc ? `<a class="meta-link" href="${s.doc}" target="_blank" onclick="event.stopPropagation()"><i class="ti ti-file-text"></i>Doc</a>` : '';
  const quickAdvance = (s.status!=='completed'&&s.status!=='not-started'&&nextStage)
    ? `<button class="quick-advance" onclick="event.stopPropagation();advanceStatus('${s.id}')"><i class="ti ti-check"></i> Done: ${STATUS_LABELS[s.status]}</button>` : '';
  return `<div class="${cardClass}" id="card-${s.id}">
    <div class="sermon-header" onclick="toggleCard('${s.id}')">
      <div class="sermon-main">
        <div class="sermon-title-row">
          <span class="sermon-title">${s.title||'Untitled'}</span>
          ${s.series?`<span class="series-badge">${s.series}</span>`:''}
          ${s.context?`<span class="context-badge">${s.context}</span>`:''}
          ${renderStatusPill(s.status)}
          ${behind?`<span class="behind-badge"><i class="ti ti-alert-triangle"></i> Behind</span>`:''}
        </div>
        <div class="sermon-meta">
          ${s.text?`<span class="meta-item"><i class="ti ti-book-2"></i>${s.text}</span>`:''}
          <span class="meta-item"><i class="ti ti-calendar"></i>${formatDateFull(parseDate(s.date))}</span>
          ${docLink}
        </div>
      </div>
      <div class="sermon-right">
        ${quickAdvance}
        <span class="urgency-pill ${getUrgencyClass(s)}">${getUrgencyLabel(s)}</span>
        <i class="ti ti-chevron-down chevron ${isOpen?'open':''}" id="chev-${s.id}"></i>
      </div>
    </div>
    <div class="card-progress">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${pct}%</span>
    </div>
    <div class="sermon-body ${isOpen?'open':''}" id="body-${s.id}">
      <div class="stages-grid">${renderStages(s)}</div>
      <div class="action-row">
        ${s.status!=='completed'?`<button class="action-btn primary" onclick="advanceStatus('${s.id}')"><i class="ti ti-arrow-right"></i> Mark next stage done</button>`:''}
        <button class="action-btn" onclick="openEdit('${s.id}')"><i class="ti ti-edit"></i> Edit</button>
        <button class="action-btn danger" onclick="deleteSermon('${s.id}')"><i class="ti ti-trash"></i></button>
        ${s.doc?`<a class="action-btn" href="${s.doc}" target="_blank"><i class="ti ti-external-link"></i> Open doc</a>`:''}
      </div>
    </div>
  </div>`;
}

function renderSidebarCard(s, mode) {
  const pct = getProgressPct(s.status);
  const behind = isBehind(s);
  const isActiveMode = mode==='active';
  const nextStage = STATUS_ORDER[STATUS_ORDER.indexOf(s.status)+1];
  let cardClass = 'sb-card';
  if (mode==='upcoming') cardClass+=' upcoming-card';
  if (mode==='completed') cardClass+=' completed-card';
  if (behind) cardClass+=' behind';
  const advanceBtn = (isActiveMode && s.status!=='not-started' && s.status!=='completed' && nextStage)
    ? `<button class="sb-advance" onclick="event.stopPropagation();advanceStatus('${s.id}')"><i class="ti ti-check"></i> Done: ${STATUS_LABELS[s.status]}</button>` : '';
  const docBtn = s.doc ? `<a class="sb-doc" href="${s.doc}" target="_blank" onclick="event.stopPropagation()"><i class="ti ti-file-text"></i> Doc</a>` : '';
  const footer = isActiveMode ? `
    <div class="sb-footer" onclick="event.stopPropagation()">
      <div class="sb-progress-wrap">
        <div class="sb-progress-bg"><div class="sb-progress-fill" style="width:${pct}%"></div></div>
        <span class="sb-pct">${pct}%</span>
      </div>
      ${docBtn}${advanceBtn}
    </div>` : (s.doc ? `<div class="sb-footer"><a class="sb-doc" href="${s.doc}" target="_blank" onclick="event.stopPropagation()"><i class="ti ti-file-text"></i> Doc</a></div>` : '');
  return `<div class="${cardClass}" onclick="openEdit('${s.id}')">
    <div class="sb-header">
      <div class="sb-title">${s.title||'Untitled'}</div>
      ${s.text?`<div class="sb-text">${s.text}</div>`:''}
      <div class="sb-meta">
        <span class="sb-date"><i class="ti ti-calendar" style="font-size:11px"></i>${formatDateFull(parseDate(s.date))}</span>
        ${s.context?`<span class="context-badge">${s.context}</span>`:''}
        ${s.series?`<span class="series-badge">${s.series}</span>`:''}
        ${behind?`<span class="behind-badge"><i class="ti ti-alert-triangle"></i> Behind</span>`:''}
      </div>
    </div>
    ${footer}
  </div>`;
}

// ── TO-DO ─────────────────────────────────────────────────────────────────────
function renderTodo() {
  const t = today();
  const threeWeeks = new Date(t); threeWeeks.setDate(t.getDate()+7);
  const items = [];
  const activeSermons = allSermons.filter(s=>isActive(s)&&s.status!=='completed');
  activeSermons.forEach(s => {
    const curIdx = STATUS_ORDER.indexOf(s.status);
    for (let i=Math.max(curIdx,1); i<STATUS_ORDER.length-1; i++) {
      const stage = STAGES[i];
      if (stage.dueDay===null) continue;
      const due = getStageDueDate(s.date, stage.key);
      if (!due||due>threeWeeks) continue;
      if (i<curIdx) continue;
      items.push({sermon:s, stage, due, d:daysUntil(due)});
    }
    const sd = parseDate(s.date);
    if (sd<=threeWeeks&&daysUntil(sd)>=0) {
      items.push({sermon:s, stage:{key:'sermon',label:'Preach!'}, due:sd, d:daysUntil(sd), isSermon:true});
    }
  });
  items.sort((a,b) => {
    const sc = a.sermon.date.localeCompare(b.sermon.date);
    if (sc!==0) return sc;
    return a.due-b.due;
  });
  const el = document.getElementById('todo-list');
  if (items.length===0) {
    el.innerHTML = `<div class="todo-empty">No tasks in the next 7 days — you're ahead! 🎉</div>`;
    return;
  }
  el.innerHTML = items.map(item => {
    const {sermon, stage, d, isSermon} = item;
    const urgCls = d<0?'overdue':d<=3?'urgent':d<=7?'upcoming':'far';
    const dueLabel = d<0?`${Math.abs(d)}d overdue`:d===0?'Today':d===1?'Tomorrow':`In ${d}d`;
    const sermonMeta = `${sermon.title}${sermon.context?' · '+sermon.context:''}`;
    const advBtn = (!isSermon&&sermon.status!=='completed')
      ? `<button class="todo-advance ${d<0?'overdue-btn':''}" onclick="advanceStatus('${sermon.id}')"><i class="ti ti-check"></i> Done</button>` : '';
    return `<div class="todo-item">
      <div class="todo-dot ${urgCls}"></div>
      <div class="todo-content">
        <div class="todo-task">${stage.label}</div>
        <div class="todo-sermon">${sermonMeta} · ${formatDate(item.due)}</div>
      </div>
      <div class="todo-right">
        <div class="todo-due ${urgCls}">${dueLabel}</div>
        ${advBtn}
      </div>
    </div>`;
  }).join('');
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function buildCalendarEvents() {
  const events = {};
  const add = (dateStr, label, cls) => {
    if (!events[dateStr]) events[dateStr]=[];
    events[dateStr].push({label,cls});
  };
  allSermons.filter(s=>s.status!=='completed').forEach(s => {
    const name = s.title.split(' ').slice(0,3).join(' ');
    add(s.date,`📖 ${name}`,'ev-sermon');
    const curIdx = STATUS_ORDER.indexOf(s.status);
    STAGES.filter(st=>st.dueDay!==null&&st.key!=='completed'&&st.key!=='not-started').forEach(st => {
      const stIdx = STATUS_ORDER.indexOf(st.key);
      if (stIdx<curIdx) return;
      const due = getStageDueDate(s.date, st.key);
      if (!due) return;
      const clsMap={study:'ev-study',idea:'ev-idea',outline:'ev-outline',draft:'ev-draft',final:'ev-final',run:'ev-run'};
      add(toYMD(due), st.label, daysUntil(due)<0?'ev-overdue':(clsMap[st.key]||'ev-study'));
    });
  });
  return events;
}

function renderCalendar() {
  const t = today();
  const events = buildCalendarEvents();
  const dow = t.getDay();
  const daysToMon = dow===0?-6:1-dow;
  const startDate = new Date(t);
  startDate.setDate(t.getDate()+daysToMon+(calWeekOffset*7));
  const endDate = new Date(startDate); endDate.setDate(startDate.getDate()+27);
  document.getElementById('cal-title').textContent =
    `${startDate.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${endDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  const todayStr = toYMD(t);
  let html='';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{html+=`<div class="cal-day-header">${d}</div>`;});
  for (let i=0;i<28;i++) {
    const d=new Date(startDate); d.setDate(startDate.getDate()+i);
    const dateStr=toYMD(d);
    const dow2=d.getDay();
    const isToday=dateStr===todayStr;
    const isWeekend=dow2===0||dow2===6;
    let cls='cal-day';
    if (isToday) cls+=' today'; else if (isWeekend) cls+=' weekend';
    const dayEvents=events[dateStr]||[];
    const evHtml=dayEvents.slice(0,3).map(ev=>`<div class="cal-event ${ev.cls}" title="${ev.label}">${ev.label}</div>`).join('');
    const more=dayEvents.length>3?`<div style="font-size:9px;color:var(--text-tertiary);padding:0 2px;">+${dayEvents.length-3} more</div>`:'';
    html+=`<div class="${cls}"><div class="cal-day-num">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>${evHtml}${more}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}
window.calPrev = function(){calWeekOffset--;renderCalendar();};
window.calNext = function(){calWeekOffset++;renderCalendar();};
window.calReset = function(){calWeekOffset=0;renderCalendar();};

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebarSection(elId, title, sermons, mode, firstSection=false) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (sermons.length===0) { el.innerHTML=''; return; }
  el.innerHTML = `
    <div class="section-header" ${firstSection?'style="margin-top:0;"':''}>
      <div class="section-title">${title}</div>
      <div class="section-line"></div>
      <div class="section-count">${sermons.length}</div>
    </div>
    ${sermons.map(s=>renderSidebarCard(s,mode)).join('')}`;
}

function renderAll() {
  const active = allSermons.filter(s=>isActive(s)&&s.status!=='completed');
  const upcoming = allSermons.filter(s=>s.status==='not-started'&&!isActive(s));
  const completed = allSermons.filter(s=>s.status==='completed');
  const behind = active.filter(s=>isBehind(s));
  const allFuture = allSermons.filter(s=>s.status!=='completed'&&daysUntil(parseDate(s.date))>=0);

  document.getElementById('stat-upcoming').textContent = allFuture.length;
  document.getElementById('stat-progress').textContent = active.filter(s=>s.status!=='not-started').length;
  document.getElementById('stat-behind').textContent = behind.length;
  document.getElementById('stat-days').textContent = allFuture.length>0?daysUntil(parseDate(allFuture[0].date)):'—';

  renderTodo();

  const activeEl = document.getElementById('active-section');
  if (active.length===0) {
    activeEl.innerHTML = `
      <div class="section-header">
        <div class="section-title">Active sermons</div>
        <div class="section-line"></div>
        <div class="section-count">0</div>
      </div>
      <div class="empty-state"><i class="ti ti-book"></i>No active sermons.</div>`;
  } else {
    activeEl.innerHTML = `
      <div class="section-header">
        <div class="section-title">Active sermons</div>
        <div class="section-line"></div>
        <div class="section-count">${active.length}</div>
      </div>
      ${active.map(s=>renderSermonCard(s)).join('')}`;
  }

  renderCalendar();
  renderSidebarSection('sidebar-active', 'Active', active, 'active', true);
  renderSidebarSection('sidebar-upcoming', 'Upcoming', upcoming, 'upcoming');
  renderSidebarSection('sidebar-completed', 'Completed', completed, 'completed');
  renderSidebarSection('mobile-upcoming-section', 'Upcoming Sermons', upcoming, 'upcoming');
  renderSidebarSection('mobile-completed-section', 'Completed Sermons', completed, 'completed');
}

// ── CARD TOGGLE ───────────────────────────────────────────────────────────────
window.toggleCard = function(id) {
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  if (!body||!chev) return;
  if (openCards.has(id)) { openCards.delete(id); body.classList.remove('open'); chev.classList.remove('open'); }
  else { openCards.add(id); body.classList.add('open'); chev.classList.add('open'); }
};

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.advanceStatus = async function(id) {
  const s=allSermons.find(x=>x.id===id);
  if (!s) return;
  const idx=STATUS_ORDER.indexOf(s.status);
  if (idx<STATUS_ORDER.length-1) {
    const newStatus=STATUS_ORDER[idx+1];
    if (newStatus==='completed') openCards.delete(id);
    s.status=newStatus;
    renderAll();
    await saveSermonToDb(s);
  }
};

window.deleteSermon = async function(id) {
  if (!confirm('Delete this sermon?')) return;
  openCards.delete(id);
  allSermons=allSermons.filter(s=>s.id!==id);
  renderAll();
  await deleteSermonFromDb(id);
};

// ── MODAL ─────────────────────────────────────────────────────────────────────
window.handleContextSelect = function() {
  const sel=document.getElementById('f-context-select').value;
  document.getElementById('f-context-other').style.display=sel==='other'?'block':'none';
};
function getContextValue() {
  const sel=document.getElementById('f-context-select').value;
  if (sel==='other') return document.getElementById('f-context-other').value.trim();
  return sel;
}
function setContextValue(val) {
  const sel=document.getElementById('f-context-select');
  const other=document.getElementById('f-context-other');
  if (!val){sel.value='';other.style.display='none';return;}
  if (val==='Salt'||val==='Candeo'){sel.value=val;other.style.display='none';}
  else{sel.value='other';other.style.display='block';other.value=val;}
}
function buildContextOptions() {
  const sel = document.getElementById('f-context-select');
  sel.innerHTML = '<option value="">— Select —</option>' +
    userContexts.map(c => `<option value="${c}">${c}</option>`).join('') +
    '<option value="other">Other...</option>';
  const statusSel = document.getElementById('f-status');
  statusSel.innerHTML = STATUS_ORDER.map(k => `<option value="${k}">${STATUS_LABELS[k]}</option>`).join('');
}

window.openAdd = function() {
  editingId=null;
  document.getElementById('modal-title').textContent='Add sermon';
  ['f-title','f-text','f-series','f-date','f-doc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='not-started';
  buildContextOptions();
  setContextValue('');
  document.getElementById('modal').classList.add('open');
};
window.openEdit = function(id) {
  const s=allSermons.find(x=>x.id===id);
  if (!s) return;
  editingId=id;
  buildContextOptions();
  document.getElementById('modal-title').textContent='Edit sermon';
  document.getElementById('f-title').value=s.title||'';
  document.getElementById('f-text').value=s.text||'';
  document.getElementById('f-series').value=s.series||'';
  document.getElementById('f-date').value=s.date||'';
  document.getElementById('f-doc').value=s.doc||'';
  document.getElementById('f-status').value=s.status||'not-started';
  setContextValue(s.context||'');
  document.getElementById('modal').classList.add('open');
};
window.closeModal = function(){document.getElementById('modal').classList.remove('open');};
window.saveSermon = async function() {
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  if (!title||!date){alert('Please enter a title and sermon date.');return;}
  const btn=document.getElementById('save-btn');
  btn.textContent='Saving...';btn.disabled=true;
  const context=getContextValue();
  const doc_link=document.getElementById('f-doc').value.trim();
  const status=document.getElementById('f-status').value;
  const text=document.getElementById('f-text').value.trim();
  const series=document.getElementById('f-series').value.trim();

  let sermon;
  if (editingId!==null) {
    sermon=allSermons.find(x=>x.id===editingId);
    if (sermon){sermon.title=title;sermon.text=text;sermon.series=series;sermon.date=date;sermon.status=status;sermon.context=context;sermon.doc=doc_link;}
  } else {
    sermon={id:'s'+Date.now(),title,text,series,date,status,context,doc:doc_link};
    allSermons.push(sermon);
    allSermons.sort((a,b)=>a.date.localeCompare(b.date));
  }
  await saveSermonToDb(sermon);
  renderAll();
  window.closeModal();
  btn.textContent='Save sermon';btn.disabled=false;
};

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)window.closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){window.closeNav();window.closeModal();}});

// ── INIT ──────────────────────────────────────────────────────────────────────
const t=today();
document.getElementById('nav-date').textContent=t.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const todayLabelEl=document.getElementById('today-label');
if(todayLabelEl) todayLabelEl.textContent=t.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
</script>
