<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sermon Prep Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #fafaf9;
    --text-primary: #1c1917;
    --text-secondary: #78716c;
    --text-tertiary: #a8a29e;
    --border: rgba(28,25,23,0.12);
    --border-md: rgba(28,25,23,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --blue-bg: #e6f1fb;
    --blue-text: #185fa5;
    --green-bg: #eaf3de;
    --green-text: #3b6d11;
    --amber-bg: #faeeda;
    --amber-text: #854f0b;
    --red-bg: #fcebeb;
    --red-text: #a32d2d;
    --purple-bg: #eeedfe;
    --purple-text: #534ab7;
    --teal-bg: #e1f5ee;
    --teal-text: #0f6e56;
    --coral-bg: #faece7;
    --coral-text: #993c1d;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1917;
      --bg-secondary: #292524;
      --bg-tertiary: #1c1917;
      --text-primary: #fafaf9;
      --text-secondary: #a8a29e;
      --text-tertiary: #78716c;
      --border: rgba(250,250,249,0.12);
      --border-md: rgba(250,250,249,0.22);
      --blue-bg: #0c3d6e;
      --blue-text: #93c5fd;
      --green-bg: #14401a;
      --green-text: #86efac;
      --amber-bg: #451a03;
      --amber-text: #fcd34d;
      --red-bg: #450a0a;
      --red-text: #fca5a5;
      --purple-bg: #2e1065;
      --purple-text: #c4b5fd;
      --teal-bg: #042f2e;
      --teal-text: #5eead4;
      --coral-bg: #431407;
      --coral-text: #fdba74;
    }
  }

  html { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); font-size: 16px; }
  body { min-height: 100vh; }
  .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.75rem; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
  .top-bar .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

  .top-actions { display: flex; gap: 8px; align-items: center; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
  .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
  .stat-num { font-size: 22px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .stat-num.small { font-size: 14px; font-weight: 500; padding-top: 4px; }

  .btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg); color: var(--text-primary); font-size: 13px; font-family: var(--font); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg-secondary); }
  .btn.primary { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; font-weight: 500; }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { color: var(--red-text); }

  .sync-status { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0; }
  .sync-dot.synced { background: var(--green-text); }
  .sync-dot.syncing { background: var(--amber-text); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red-text); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .sermon-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
  .sermon-header { padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .sermon-header:hover { background: var(--bg-secondary); }
  .sermon-main { flex: 1; min-width: 0; }
  .sermon-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sermon-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .series-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--blue-bg); color: var(--blue-text); white-space: nowrap; font-weight: 500; }
  .sermon-meta { display: flex; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
  .meta-item { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
  .meta-item i { font-size: 13px; }
  .sermon-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .urgency-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .urgency-urgent { background: var(--red-bg); color: var(--red-text); }
  .urgency-soon { background: var(--amber-bg); color: var(--amber-text); }
  .urgency-ok { background: var(--green-bg); color: var(--green-text); }
  .urgency-far { background: var(--bg-secondary); color: var(--text-secondary); }
  .chevron { font-size: 16px; color: var(--text-tertiary); transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }
  .sermon-body { border-top: 0.5px solid var(--border); padding: 16px; display: none; }
  .sermon-body.open { display: block; }

  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .progress-bar-bg { flex: 1; height: 4px; background: var(--bg-secondary); border-radius: 2px; }
  .progress-bar-fill { height: 4px; border-radius: 2px; background: var(--blue-text); transition: width 0.4s; }
  .progress-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; min-width: 80px; text-align: right; }

  .stages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 14px; }
  .stage { border-radius: var(--radius-md); padding: 10px 12px; border: 0.5px solid var(--border); }
  .stage-name { font-size: 10px; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
  .stage-date { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .stage-by { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
  .stage-done { opacity: 0.45; }
  .stage-done .stage-date { text-decoration: line-through; }
  .stage-active { border-color: var(--blue-text); border-width: 1.5px; background: var(--blue-bg); }
  .stage-active .stage-name { color: var(--blue-text); }
  .stage-active .stage-date { color: var(--blue-text); }
  .stage-overdue { border-color: var(--red-text); border-width: 1.5px; background: var(--red-bg); }
  .stage-overdue .stage-name { color: var(--red-text); }
  .stage-overdue .stage-date { color: var(--red-text); }

  .action-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .action-btn { font-size: 12px; padding: 6px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: transparent; color: var(--text-primary); font-family: var(--font); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.15s; }
  .action-btn:hover { background: var(--bg-secondary); }
  .action-btn.primary { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; font-weight: 500; }
  .action-btn.primary:hover { opacity: 0.85; }
  .action-btn.danger { color: var(--red-text); }
  .today-task { font-size: 12px; color: var(--text-secondary); margin-left: auto; }
  .today-task strong { color: var(--text-primary); }

  .status-pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .sp-study { background: var(--green-bg); color: var(--green-text); }
  .sp-idea { background: var(--blue-bg); color: var(--blue-text); }
  .sp-outline { background: var(--amber-bg); color: var(--amber-text); }
  .sp-draft { background: var(--purple-bg); color: var(--purple-text); }
  .sp-final { background: var(--teal-bg); color: var(--teal-text); }
  .sp-run { background: var(--coral-bg); color: var(--coral-text); }

  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-secondary); font-size: 14px; }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 12px; opacity: 0.35; }

  .loading-state { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 14px; }
  .loading-state i { font-size: 32px; display: block; margin-bottom: 10px; opacity: 0.35; animation: spin 1s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .error-banner { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-text); border-radius: var(--radius-md); padding: 12px 16px; font-size: 13px; margin-bottom: 1rem; display: none; }
  .error-banner.show { display: block; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-xl); border: 0.5px solid var(--border-md); padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 18px; color: var(--text-primary); }
  .form-field { margin-bottom: 14px; }
  .form-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 500; }
  .form-field input, .form-field select { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font); font-size: 14px; outline: none; transition: border-color 0.15s; }
  .form-field input:focus, .form-field select:focus { border-color: var(--blue-text); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <div>
      <h1>Sermon prep</h1>
      <div class="subtitle" id="today-label"></div>
    </div>
    <div class="top-actions">
      <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Loading...</span></div>
      <button class="btn" onclick="loadSermons()"><i class="ti ti-refresh"></i> Refresh</button>
      <button class="btn primary" onclick="openAdd()"><i class="ti ti-plus"></i> Add sermon</button>
    </div>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Upcoming</div><div class="stat-num" id="stat-upcoming">—</div></div>
    <div class="stat"><div class="stat-label">In progress</div><div class="stat-num" id="stat-progress">—</div></div>
    <div class="stat"><div class="stat-label">Next deadline</div><div class="stat-num small" id="stat-deadline">—</div></div>
    <div class="stat"><div class="stat-label">Days to next sermon</div><div class="stat-num" id="stat-days">—</div></div>
  </div>

  <div id="sermon-list"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add sermon</h2>
    <div class="form-field"><label>Sermon title</label><input type="text" id="f-title" placeholder="e.g. Walking by Faith" /></div>
    <div class="form-field"><label>Scripture text</label><input type="text" id="f-text" placeholder="e.g. Hebrews 11:1–6" /></div>
    <div class="form-field"><label>Series</label><input type="text" id="f-series" placeholder="e.g. Heroes of Faith" /></div>
    <div class="form-field"><label>Sermon date</label><input type="date" id="f-date" /></div>
    <div class="form-field"><label>Current status</label>
      <select id="f-status">
        <option value="study">Study</option>
        <option value="idea">Main idea</option>
        <option value="outline">Outline</option>
        <option value="draft">Draft</option>
        <option value="final">Final</option>
        <option value="run1">Run-through 1</option>
        <option value="run2">Run-through 2</option>
        <option value="run3">Run-through 3</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="action-btn" onclick="closeModal()">Cancel</button>
      <button class="action-btn primary" id="save-btn" onclick="saveSermon()">Save sermon</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxiyNYEPE58ym5RBrgOd5IszBMfk7X-ykJ306KqPHD3twEVZSm08_13j3z5aFiYmn-f/exec';

const STAGES = [
  { key: 'study', label: 'Study', daysBeforeSermon: 7 },
  { key: 'idea', label: 'Main idea', daysBeforeSermon: 6 },
  { key: 'outline', label: 'Outline', daysBeforeSermon: 5 },
  { key: 'draft', label: 'Draft', daysBeforeSermon: 3 },
  { key: 'final', label: 'Final', daysBeforeSermon: 2 },
  { key: 'run1', label: 'Run-through 1', daysBeforeSermon: 1 },
  { key: 'run2', label: 'Run-through 2', daysBeforeSermon: 1 },
  { key: 'run3', label: 'Run-through 3', daysBeforeSermon: 0 },
];

const STATUS_ORDER = ['study','idea','outline','draft','final','run1','run2','run3'];

const STATUS_LABELS = {
  study:'Study',
  idea:'Main idea',
  outline:'Outline',
  draft:'Draft',
  final:'Final',
  run1:'Run-through 1',
  run2:'Run-through 2',
  run3:'Run-through 3'
};

const STATUS_CLASSES = {
  study:'sp-study',
  idea:'sp-idea',
  outline:'sp-outline',
  draft:'sp-draft',
  final:'sp-final',
  run1:'sp-run',
  run2:'sp-run',
  run3:'sp-run'
};

let editingId = null;
let allSermons = [];

function today() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y,m-1,d);
}

function isWeekend(d) {
  return d.getDay() === 0 || d.getDay() === 6;
}

function subtractWorkdays(from, days) {
  let d = new Date(from);
  let n = 0;

  while (n < days) {
    d.setDate(d.getDate() - 1);

    if (!isWeekend(d)) {
      n++;
    }
  }

  return d;
}

function daysUntil(d) {
  return Math.round((d - today()) / 86400000);
}

function formatDate(d) {
  return d.toLocaleDateString('en-US',{
    weekday:'short',
    month:'short',
    day:'numeric'
  });
}

function formatDateFull(d) {
  return d.toLocaleDateString('en-US',{
    month:'long',
    day:'numeric',
    year:'numeric'
  });
}

function getStageDeadline(sermonDate, stageKey) {
  const d = parseDate(sermonDate);
  const stage = STAGES.find(s => s.key === stageKey);

  if (!stage) return d;

  return subtractWorkdays(d, stage.daysBeforeSermon);
}

function getStageStart(sermonDate, stageKey) {
  return subtractWorkdays(getStageDeadline(sermonDate, stageKey), 2);
}

function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');

  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-banner').classList.remove('show');
}

async function loadSermons() {
  setSyncStatus('syncing', 'Loading...');

  document.getElementById('sermon-list').innerHTML =
    `<div class="loading-state">
      <i class="ti ti-loader"></i>
      Loading your sermons...
    </div>`;

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    allSermons = (data.data || []).sort((a,b) => a.date.localeCompare(b.date) );

    hideError();
    setSyncStatus('synced', 'Synced');

    renderSermons();

  } catch(e) {
    console.error(e);

    setSyncStatus('error', 'Error');

    showError('Could not load sermons.');

    document.getElementById('sermon-list').innerHTML =
      `<div class="empty-state">
        <i class="ti ti-alert-circle"></i>
        Failed to load sermons.
      </div>`;
  }
}

async function saveAllSermons() {
  try {
    setSyncStatus('syncing', 'Saving...');

    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(allSermons)
    });

    const result = await res.json();

    if (!result.success) {
      throw new Error('Save failed');
    }

    setSyncStatus('synced', 'Saved');

  } catch(e) {
    console.error(e);

    setSyncStatus('error', 'Save failed');

    showError('Could not save sermons.');
  }
}

function renderStatusPill(status) {
  return `
    <span class="status-pill ${STATUS_CLASSES[status] || ''}">
      ${STATUS_LABELS[status] || status}
    </span>
  `;
}

function getProgressPct(status) {
  const idx = STATUS_ORDER.indexOf(status);

  if (idx < 0) return 0;

  return Math.round((idx / (STATUS_ORDER.length - 1)) * 100);
}

function getUrgencyClass(sermon) {
  const d = daysUntil(parseDate(sermon.date));

  if (d <= 3) return 'urgency-urgent';
  if (d <= 7) return 'urgency-soon';
  if (d <= 14) return 'urgency-ok';

  return 'urgency-far';
}

function getUrgencyLabel(sermon) {
  const d = daysUntil(parseDate(sermon.date));

  if (d < 0) return `${Math.abs(d)}d ago`;
  if (d === 0) return 'Today';
  if (d === 1) return 'Tomorrow';

  return `${d}d away`;
}

function renderStages(sermon) {
  const statusIdx = STATUS_ORDER.indexOf(sermon.status);

  return STAGES.map((stage, i) => {

    const dl = getStageDeadline(sermon.date, stage.key);

    let cls = '';

    if (i < statusIdx) cls = 'stage-done';

    else if (i === statusIdx) {
      cls = daysUntil(dl) < 0
        ? 'stage-overdue'
        : 'stage-active';
    }

    return `
      <div class="stage ${cls}">
        <div class="stage-name">${stage.label}</div>
        <div class="stage-date">${formatDate(dl)}</div>
      </div>
    `;
  }).join('');
}

function renderSermons() {

  const list = document.getElementById('sermon-list');

  document.getElementById('stat-upcoming').textContent =
    allSermons.length;

  document.getElementById('stat-progress').textContent =
    allSermons.filter(s => s.status !== 'run3').length;

  if (allSermons.length > 0) {
    document.getElementById('stat-days').textContent =
      daysUntil(parseDate(allSermons[0].date));
  }

  if (allSermons.length === 0) {
    list.innerHTML =
      `<div class="empty-state">
        <i class="ti ti-book"></i>
        No sermons yet.
      </div>`;
    return;
  }

  list.innerHTML = allSermons.map(s => {

    const pct = getProgressPct(s.status);

    return `
      <div class="sermon-card">

        <div class="sermon-header" onclick="toggleCard('${s.id}')">

          <div class="sermon-main">

            <div class="sermon-title-row">
              <span class="sermon-title">${s.title}</span>

              ${s.series
                ? `<span class="series-badge">${s.series}</span>`
                : ''}

              ${renderStatusPill(s.status)}
            </div>

            <div class="sermon-meta">

              <span class="meta-item">
                <i class="ti ti-book-2"></i>
                ${s.text || ''}
              </span>

              <span class="meta-item">
                <i class="ti ti-calendar"></i>
                ${formatDateFull(parseDate(s.date))}
              </span>

            </div>
          </div>

          <div class="sermon-right">

            <span class="urgency-pill ${getUrgencyClass(s)}">
              ${getUrgencyLabel(s)}
            </span>

            <i class="ti ti-chevron-down chevron" id="chev-${s.id}"></i>

          </div>
        </div>

        <div class="sermon-body" id="body-${s.id}">

          <div class="progress-row">

            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>

            <span class="progress-label">${pct}% complete</span>

          </div>

          <div class="stages-grid">
            ${renderStages(s)}
          </div>

          <div class="action-row">

            <button class="action-btn primary"
              onclick="advanceStatus('${s.id}')">

              <i class="ti ti-arrow-right"></i>
              Mark next stage done

            </button>

            <button class="action-btn"
              onclick="openEdit('${s.id}')">

              <i class="ti ti-edit"></i>
              Edit

            </button>

            <button class="action-btn danger"
              onclick="deleteSermon('${s.id}')">

              <i class="ti ti-trash"></i>

            </button>

          </div>

        </div>
      </div>
    `;
  }).join('');
}

function toggleCard(id) {
  document.getElementById('body-' + id).classList.toggle('open');
  document.getElementById('chev-' + id).classList.toggle('open');
}

async function advanceStatus(id) {
  const s = allSermons.find(x => x.id === id);

  if (!s) return;

  const idx = STATUS_ORDER.indexOf(s.status);

  if (idx < STATUS_ORDER.length - 1) {
    s.status = STATUS_ORDER[idx + 1];

    renderSermons();

    await saveAllSermons();
  }
}

async function deleteSermon(id) {

  if (!confirm('Delete this sermon?')) return;

  allSermons = allSermons.filter(s => s.id !== id);

  renderSermons();

  await saveAllSermons();
}

function openAdd() {

  editingId = null;

  document.getElementById('modal-title').textContent =
    'Add sermon';

  ['f-title','f-text','f-series','f-date']
    .forEach(id => document.getElementById(id).value = '');

  document.getElementById('f-status').value = 'study';

  document.getElementById('modal').classList.add('open');
}

function openEdit(id) {

  const s = allSermons.find(x => x.id === id);

  if (!s) return;

  editingId = id;

  document.getElementById('modal-title').textContent =
    'Edit sermon';

  document.getElementById('f-title').value = s.title;
  document.getElementById('f-text').value = s.text;
  document.getElementById('f-series').value = s.series;
  document.getElementById('f-date').value = s.date;
  document.getElementById('f-status').value = s.status;

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function saveSermon() {

  const title =
    document.getElementById('f-title').value.trim();

  const date =
    document.getElementById('f-date').value;

  if (!title || !date) {
    alert('Please enter a title and date.');
    return;
  }

  const sermon = {
    id: editingId || 's' + Date.now(),
    title,
    text: document.getElementById('f-text').value.trim(),
    series: document.getElementById('f-series').value.trim(),
    date,
    status: document.getElementById('f-status').value
  };

  if (editingId) {
    const idx = allSermons.findIndex(s => s.id === editingId);
    allSermons[idx] = sermon;
  } else {
    allSermons.push(sermon);
  }

  allSermons.sort((a,b) => a.date.localeCompare(b.date));

  renderSermons();

  closeModal();

  await saveAllSermons();
}

document.getElementById('modal')
  .addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

const t = today();

document.getElementById('today-label').textContent =
  t.toLocaleDateString('en-US',{
    weekday:'long',
    month:'long',
    day:'numeric',
    year:'numeric'
  });

loadSermons();
</script>
