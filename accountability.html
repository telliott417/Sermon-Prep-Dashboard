<style>
  /* ── ACCOUNTABILITY PAGE — SPECIFIC STYLES ── */
  .main { padding: 1.25rem 2rem 4rem; min-width: 0; }

  /* Button variants */
  .btn.danger { color: var(--red); border-color: var(--red-border); }
  .btn.danger:hover { background: var(--red-light); }
  .btn-ghost { background: none; border: 1px solid var(--border-md); color: var(--stone); border-radius: var(--radius-md); padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); }
  .btn-ghost:hover { background: var(--warm-bg); }
  .btn-brand { background: var(--brand); color: white; border: none; border-radius: var(--radius-md); padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); font-weight: 500; }
  .btn-brand:hover { opacity: 0.9; }

  /* Onboard two-column layout */
  .onboard-wrap { max-width: 720px; }
  .onboard-grid { display: grid; grid-template-columns: 1fr 1px 1fr; background: var(--white); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
  .onboard-col { padding: 2rem; }
  .onboard-col h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .onboard-col p { font-size: 12px; color: var(--stone); margin-bottom: 1.25rem; line-height: 1.6; }
  .onboard-vdivider { background: var(--border); }
  .onboard-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .onboard-row input { flex: 1; padding: 9px 12px; border: 1px solid var(--border-md); border-radius: var(--radius-md); background: var(--warm-bg); color: var(--ink); font-family: var(--font); font-size: 14px; outline: none; }
  .onboard-row input.code-input { text-transform: uppercase; letter-spacing: 0.08em; }
  .onboard-row input:focus { border-color: var(--blue-text); }
  .onboard-error { font-size: 12px; color: var(--red); margin-top: 6px; min-height: 18px; }

  /* Member grid */
  .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .member-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-xl); box-shadow: var(--shadow-sm); }
  .member-card.on-track   { border-top: 3px solid var(--green); }
  .member-card.behind     { border-top: 3px solid var(--red); }
  .member-card.no-sermons { border-top: 3px solid var(--stone-light); }
  .member-header { padding: 16px 18px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 14px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member-sub { font-size: 11px; color: var(--stone); margin-top: 2px; }
  .member-you { font-size: 10px; color: var(--stone-light); display: inline; margin-left: 4px; }
  .member-status-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 100px; white-space: nowrap; flex-shrink: 0; }
  .member-status-badge.on-track   { background: var(--green-light);  color: var(--green); }
  .member-status-badge.behind     { background: var(--red-light);    color: var(--red); }
  .member-status-badge.no-sermons { background: var(--warm-bg);      color: var(--stone); }

  /* Sermon rows */
  .sermon-rows { padding: 0; }
  .sermon-row { padding: 10px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .sermon-row:last-child { border-bottom: none; }
  .sermon-row:hover { background: var(--bg); }
  .sermon-row-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
  .sermon-row-scripture { font-size: 11px; color: var(--stone); font-weight: 400; }
  .sermon-row-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .sermon-row-date { font-size: 11px; color: var(--stone); }
  .sermon-row-stage { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 100px; }
  .sermon-row-context { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 100px; background: var(--warm-bg); color: var(--stone); }
  .stage-on-track { background: var(--green-light); color: var(--green); }
  .stage-behind   { background: var(--red-light);   color: var(--red); }
  .stage-neutral  { background: var(--warm-bg);     color: var(--stone); }
  .sermon-row-progress { margin-top: 6px; display: flex; align-items: center; gap: 8px; }
  .prog-bg { flex: 1; height: 3px; background: var(--warm-bg); border-radius: 2px; }
  .prog-fill { height: 3px; border-radius: 2px; }
  .prog-fill.on-track { background: var(--green); }
  .prog-fill.behind   { background: var(--red); }
  .prog-fill.neutral  { background: var(--stone-light); }
  .prog-pct { font-size: 10px; color: var(--stone-light); white-space: nowrap; }
  .no-sermons-msg { padding: 1.5rem 18px; font-size: 13px; color: var(--stone-light); text-align: center; }

  /* Score rings */
  .rings-outer-wrap { position: relative; display: inline-block; flex-shrink: 0; }
  .member-rings-wrap { position: relative; width: 80px; height: 80px; cursor: pointer; }
  .score-tooltip { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: var(--white); border: 1px solid var(--border-md); border-radius: var(--r-lg); padding: 14px 16px; display: none; gap: 16px; align-items: center; white-space: nowrap; z-index: 200; box-shadow: 0 4px 16px rgba(20,18,16,0.12); }
  .score-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--border-md); }
  .score-tooltip::before { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--white); z-index: 1; }
  .member-rings-wrap:hover .score-tooltip { display: flex; }
  .tooltip-ring { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .tooltip-ring-wrap { position: relative; width: 52px; height: 52px; }
  .tooltip-ring-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .tooltip-score { font-size: 14px; font-weight: 800; line-height: 1; }
  .tooltip-label { font-size: 11px; color: var(--stone); }
  .tooltip-divider { width: 1px; height: 40px; background: var(--border-md); align-self: center; }

  @media (max-width: 768px) {
    .main { padding: 12px 12px 24px; }
    .team-score-wrap { padding: 16px !important; }
    .team-score-grid { grid-template-columns: 1fr !important; gap: 0 !important; }
    .team-score-divider { width: 80% !important; height: 1px !important; background: var(--border) !important; margin: 12px auto !important; }
    .member-grid { grid-template-columns: 1fr !important; }
    .onboard-grid { grid-template-columns: 1fr !important; }
    .onboard-vdivider { width: 100% !important; height: 1px !important; }
    .topbar { display: flex !important; flex-direction: row !important; align-items: center !important; justify-content: space-between !important; flex-wrap: nowrap !important; gap: 8px !important; padding: 12px 14px !important; position: sticky !important; top: 0 !important; z-index: 50 !important; background: var(--bg) !important; border-bottom: 1px solid var(--border) !important; }
    .topbar-greeting { flex: 1 !important; min-width: 0 !important; font-size: 14px !important; font-weight: 700 !important; overflow: hidden !important; text-overflow: ellipsis !important; white-space: nowrap !important; }
    .topbar-actions { flex-shrink: 0 !important; display: flex !important; gap: 6px !important; }
    .topbar-actions button { font-size: 11px !important; padding: 7px 11px !important; white-space: nowrap !important; border-radius: 100px !important; }
  }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzrDYUgAAbGHgQmm5PxGDh1dhWqdKp-pI",
  authDomain: "sermon-prep-dashboard.firebaseapp.com",
  projectId: "sermon-prep-dashboard",
  storageBucket: "sermon-prep-dashboard.firebasestorage.app",
  messagingSenderId: "769289223341",
  appId: "1:769289223341:web:3dc1d53e57d96b3c55da24"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
let currentUser = null;

// ── SCORE COLORS ──────────────────────────────────────────────────────────────
const SCORE_COLORS = [
  {min:96,max:100,color:'#00CC55'}, {min:91,max:95,color:'#1A9A4A'},
  {min:86,max:90,color:'#2DB85C'}, {min:81,max:85,color:'#52CC6E'},
  {min:76,max:80,color:'#7DD47A'}, {min:71,max:75,color:'#C8D44A'},
  {min:66,max:70,color:'#E0C832'}, {min:61,max:65,color:'#F0A820'},
  {min:56,max:60,color:'#F08818'}, {min:51,max:55,color:'#E86818'},
  {min:46,max:50,color:'#E04C14'}, {min:41,max:45,color:'#D43010'},
  {min:0, max:40, color:'#880000'},
];
function getScoreColor(score) {
  for (const b of SCORE_COLORS) if (score >= b.min && score <= b.max) return b.color;
  return '#880000';
}
function calculateOverallScore(streakData) {
  const scores = streakData.weeklyScores || [];
  if (scores.length === 0) return 75;
  const sum = scores.reduce((acc, w) => acc + (w.score ?? 75), 0);
  return Math.round(sum / scores.length);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {

        dAvatar.style.background = 'none';

function setSyncStatus(state, label) {

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(str) { if (!str) return null; const [y,m,d] = str.split('-').map(Number); return new Date(y,m-1,d); }
function daysUntil(d) { return Math.round((d - today()) / 86400000); }
function formatDateFull(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

function getStageDueDate(sermonDateStr, stage) {
  if (!stage || stage.dueDay === null) return null;
  const sermonDate = parseDate(sermonDateStr);
  const base = new Date(sermonDate);
  base.setDate(sermonDate.getDate() - (stage.weeksBack * 7));
  const baseDow = base.getDay();
  let diff = baseDow - stage.dueDay;
  if (diff < 0) diff += 7;
  let result = new Date(base);
  result.setDate(base.getDate() - diff);
  if (result > sermonDate && stage.key !== 'completed') {
    result = new Date(sermonDate);
  }
  return result;
}

function isSermonBehind(sermon, stages) {
  if (sermon.status === 'completed') return false;
  if (sermon.status === 'not-started') {
    const firstStage = stages.find(s => s.key !== 'not-started' && s.key !== 'completed');
    if (!firstStage) return false;
    const due = getStageDueDate(sermon.date, firstStage);
    if (!due) return false;
    return daysUntil(due) < 0;
  }
  const stage = stages.find(s => s.key === sermon.status);
  if (!stage) return false;
  const due = getStageDueDate(sermon.date, stage);
  if (!due) return false;
  return daysUntil(due) < 0;
}

function getProgressPct(status, statusOrder) {
  const idx = statusOrder.indexOf(status);
  if (idx <= 0) return 0;
  if (status === 'completed') return 100;
  const totalWorkingStages = statusOrder.length - 2;
  const completedStages = idx - 1;
  return totalWorkingStages > 0 ? Math.round((completedStages / totalWorkingStages) * 100) : 0;
}

function calcWeekScore(sermons, stages) {
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  let deductions = 0;
  const activeSermons = sermons.filter(s => s.status !== 'completed' && s.date && new Date(s.date.replace(/-/g,'/')) >= todayDate);
  for (const s of activeSermons) {
    const stageKeys = stages.map(st => st.key);
    const currentIdx = stageKeys.indexOf(s.status);
    for (let i = currentIdx; i < stages.length - 1; i++) {
      const stage = stages[i];
      if (!stage.dueDay && stage.dueDay !== 0) continue;
      const due = getStageDueDate(s.date, stage);
      if (!due) continue;
      const diff = Math.round((due - todayDate) / 86400000);
      if (diff < 0) deductions += Math.min(20, 10 + (Math.abs(diff) - 1) * 5);
      else if (diff <= 1) deductions += 10;
      else if (diff === 2) deductions += 5;
    }
  }
  return { score: Math.max(0, 100 - deductions), hasData: activeSermons.length > 0 };
}

// ── MIGRATION ─────────────────────────────────────────────────────────────────
async function migrateTeamData(uid) {
  const oldRef = doc(db, 'users', uid, 'meta', 'team');
  const newRef = doc(db, 'users', uid, 'meta', 'teams');
  const [oldSnap, newSnap] = await Promise.all([getDoc(oldRef), getDoc(newRef)]);

  if (newSnap.exists()) return newSnap.data().codes || [];

  if (oldSnap.exists() && oldSnap.data().code) {
    const code = oldSnap.data().code;
    await setDoc(newRef, { codes: [code] });
    return [code];
  }

  return [];
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  setSyncStatus('syncing', 'Loading...');
  try {
    const profileSnap = await getDoc(doc(db, 'users', currentUser.uid, 'meta', 'profile'));
    const role = profileSnap.exists() ? profileSnap.data().role : 'member';
    if (role === 'family') {
      document.getElementById('topbar-actions').innerHTML = '';
      document.getElementById('main-content').innerHTML = `
        <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:2rem;max-width:480px;">
          <div style="font-size:24px;margin-bottom:12px;">🤝</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Team Accountability</div>
          <div style="font-size:13px;color:var(--stone);line-height:1.6;">This page is for the sermon prep team. You can view the dashboard and other pages but the accountability team is for staff members only.</div>
        </div>`;
      setSyncStatus('synced', '');
      return;
    }

    const teamCodes = await migrateTeamData(currentUser.uid);

    if (teamCodes.length === 0) {
      renderOnboard();
      setSyncStatus('synced', '');
      return;
    }

    const teamSnaps = await Promise.all(teamCodes.map(code => getDoc(doc(db, 'teams', code))));
    const teams = teamSnaps.filter(snap => snap.exists()).map(snap => snap.data());

    if (teams.length === 0) {
      renderOnboard();
      setSyncStatus('synced', '');
      return;
    }

    await renderAllTeams(teams);
    setSyncStatus('synced', 'Synced');
  } catch(e) {
    setSyncStatus('error', 'Error');
    document.getElementById('main-content').innerHTML = `<p style="color:var(--red);font-size:13px;">Error: ${e.message}</p>`;
  }
}

  document.getElementById('main-content').innerHTML = `

        <div class="onboard-col">

            <input type="text" id="join-code" class="code-input" placeholder="Enter team code" maxlength="20" />
            <button class="btn primary" onclick="joinTeam()"><i class="ti ti-arrow-right"></i> Join</button>
          </div>
          <div class="onboard-error" id="join-error"></div>
        </div>

    </div>`;
}

// ── TEAM SAVE LOGIC ───────────────────────────────────────────────────────────
async function doCreateTeam(name, code, errEl) {
  if (!name) { errEl.textContent = 'Please enter a team name.'; return; }
  if (!code) { errEl.textContent = 'Please enter a team code.'; return; }
  try {
    const existing = await getDoc(doc(db, 'teams', code));
    if (existing.exists()) { errEl.textContent = 'That code is already taken. Try another.'; return; }
    await setDoc(doc(db, 'teams', code), {
      code,
      name,
      createdBy: currentUser.uid,
      createdAt: new Date().toISOString(),
      members: [{ uid: currentUser.uid, name: currentUser.displayName, email: currentUser.email, photo: currentUser.photoURL || '' }]
    });
    const teamsRef = doc(db, 'users', currentUser.uid, 'meta', 'teams');
    const teamsSnap = await getDoc(teamsRef);
    const existingCodes = teamsSnap.exists() ? (teamsSnap.data().codes || []) : [];
    await setDoc(teamsRef, { codes: [...existingCodes, code] });
    closeTeamModal();
    await init();
  } catch(e) { errEl.textContent = 'Error: ' + e.message; }
}

async function doJoinTeam(code, errEl) {
  if (!code) { errEl.textContent = 'Please enter a team code.'; return; }
  try {
    const snap = await getDoc(doc(db, 'teams', code));
    if (!snap.exists()) { errEl.textContent = 'Team code not found. Check with your team leader.'; return; }
    const team = snap.data();
    if (team.members.some(m => m.uid === currentUser.uid)) { errEl.textContent = 'You are already in this team.'; return; }
    await updateDoc(doc(db, 'teams', code), {
      members: arrayUnion({ uid: currentUser.uid, name: currentUser.displayName, email: currentUser.email, photo: currentUser.photoURL || '' })
    });
    const teamsRef = doc(db, 'users', currentUser.uid, 'meta', 'teams');
    const teamsSnap = await getDoc(teamsRef);
    const existingCodes = teamsSnap.exists() ? (teamsSnap.data().codes || []) : [];
    if (!existingCodes.includes(code)) {
      await setDoc(teamsRef, { codes: [...existingCodes, code] });
    }
    closeTeamModal();
    await init();
  } catch(e) { errEl.textContent = 'Error: ' + e.message; }
}

// ── LOAD TEAM MEMBERS ─────────────────────────────────────────────────────────
async function loadTeamMembers(team) {
  const members = team.members || [];
  const gridEl = document.getElementById(`member-grid-${team.code}`);
  const scoreEl = document.getElementById(`team-score-${team.code}`);
  if (!gridEl || !scoreEl) return;

  const defaultStages = [
    {key:'not-started',label:'Not yet started',dueDay:null,weeksBack:null},
    {key:'study',label:'Study',dueDay:2,weeksBack:2},
    {key:'idea',label:'Main idea',dueDay:2,weeksBack:2},
    {key:'outline',label:'Outline',dueDay:3,weeksBack:2},
    {key:'draft',label:'Draft',dueDay:2,weeksBack:1},
    {key:'final',label:'Final',dueDay:3,weeksBack:1},
    {key:'run',label:'Run-through',dueDay:4,weeksBack:1},
    {key:'completed',label:'Completed',dueDay:0,weeksBack:0}
  ];

  const memberData = await Promise.all(members.map(async member => {
    try {
      const [sermonsSnap, settingsSnap, streakSnap] = await Promise.all([
        getDocs(collection(db, 'users', member.uid, 'sermons')),
        getDoc(doc(db, 'users', member.uid, 'meta', 'settings')),
        getDoc(doc(db, 'users', member.uid, 'meta', 'streak_data'))
      ]);
      const sermons = sermonsSnap.docs.map(d => ({id: d.id, ...d.data()}));
      const settings = settingsSnap.exists() ? settingsSnap.data() : null;
      const stages = settings?.stages ? [
        {key:'not-started',label:'Not yet started',dueDay:null,weeksBack:null},
        ...settings.stages,
        {key:'completed',label:'Completed',dueDay:0,weeksBack:0}
      ] : defaultStages;
      const statusOrder = stages.map(s => s.key);
      const streakData = streakSnap.exists() ? streakSnap.data() : {};
      const overallScore = calculateOverallScore(streakData);
      const weekScore = calcWeekScore(sermons, stages).score;
      return { member, sermons, stages, statusOrder, overallScore, weekScore };
    } catch(e) {
      return { member, sermons: [], stages: [], statusOrder: [], overallScore: 75, weekScore: 75 };
    }
  }));

  memberData.sort((a, b) => {
    const aNext = a.sermons.filter(s => s.status !== 'completed' && daysUntil(parseDate(s.date)) >= 0).sort((x,y) => x.date.localeCompare(y.date))[0];
    const bNext = b.sermons.filter(s => s.status !== 'completed' && daysUntil(parseDate(s.date)) >= 0).sort((x,y) => x.date.localeCompare(y.date))[0];
    if (aNext && bNext) return aNext.date.localeCompare(bNext.date);
    if (aNext) return -1; if (bNext) return 1; return 0;
  });

  // ── TEAM SCORE CARD ──────────────────────────────────────────────────────────
  if (memberData.length > 0) {
    const avgOverall = Math.round(memberData.reduce((sum, d) => sum + d.overallScore, 0) / memberData.length);
    const avgWeek    = Math.round(memberData.reduce((sum, d) => sum + d.weekScore,    0) / memberData.length);
    const avgOC = getScoreColor(avgOverall);
    const avgWC = getScoreColor(avgWeek);
    const avgOuterOff = (276.5 * (1 - avgOverall / 100)).toFixed(1);
    const avgWeekOff  = (276.5 * (1 - avgWeek    / 100)).toFixed(1);
    const teamName = team.name || team.code;

    const makeTeamRing = (score, color, offset) => `
      <div style="position:relative;width:100px;height:100px;flex-shrink:0;">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="9"/>
          <circle cx="50" cy="50" r="44" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="276.5 276.5" stroke-dashoffset="${offset}" transform="rotate(-90 50 50)"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:22px;font-weight:800;color:${color};">${score}</span>
        </div>
      </div>`;

    const makeMemberDot = (d, scoreType) => {
      const score = scoreType === 'overall' ? d.overallScore : d.weekScore;
      const color = getScoreColor(score);
      const dotOffset = (69.1 * (1 - score / 100)).toFixed(1);
      const firstName = (d.member.name || d.member.email || '?').split(' ')[0];
      return `
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;" title="${firstName}: ${score}">
          <div style="position:relative;width:28px;height:28px;">
            <svg width="28" height="28" viewBox="0 0 28 28">
              <circle cx="14" cy="14" r="11" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="3"/>
              <circle cx="14" cy="14" r="11" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round"
                stroke-dasharray="69.1 69.1" stroke-dashoffset="${dotOffset}" transform="rotate(-90 14 14)"/>
            </svg>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
              <span style="font-size:7px;font-weight:700;color:${color};">${score}</span>
            </div>
          </div>
          <span style="font-size:9px;color:var(--stone);max-width:28px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${firstName}</span>
        </div>`;
    };

    scoreEl.innerHTML = `
      <div class="team-score-wrap" style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);padding:22px 28px;margin-bottom:16px;">
        <div class="team-score-grid" style="display:grid;grid-template-columns:1fr 1px 1fr;gap:24px;align-items:center;">
          <div style="display:flex;align-items:center;gap:20px;">
            ${makeTeamRing(avgOverall, avgOC, avgOuterOff)}
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--ink);">${teamName}</div>
              <div style="font-size:11px;color:var(--stone);margin-top:2px;">Average overall prep score</div>
              <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
                ${memberData.map(d => makeMemberDot(d, 'overall')).join('')}
              </div>
            </div>
          </div>
          <div class="team-score-divider" style="width:1px;height:80px;background:var(--border);margin:auto;"></div>
          <div style="display:flex;align-items:center;gap:20px;">
            ${makeTeamRing(avgWeek, avgWC, avgWeekOff)}
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--ink);">${teamName}</div>
              <div style="font-size:11px;color:var(--stone);margin-top:2px;">Resets every Monday</div>
              <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
                ${memberData.map(d => makeMemberDot(d, 'week')).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }

  // ── MEMBER CARDS ─────────────────────────────────────────────────────────────
  gridEl.innerHTML = memberData.map(({member, sermons, stages, statusOrder, overallScore, weekScore}) => {
    const isYou = member.uid === currentUser.uid;
    const canRemove = team.createdBy === currentUser.uid && !isYou;
    const upcoming = sermons
      .filter(s => s.status !== 'completed' && daysUntil(parseDate(s.date)) >= 0)
      .sort((a,b) => a.date.localeCompare(b.date))
      .slice(0, 3);

    const anyBehind = upcoming.some(s => isSermonBehind(s, stages));
    const trackClass = upcoming.length === 0 ? 'no-sermons' : anyBehind ? 'behind' : 'on-track';
    const trackLabel = upcoming.length === 0 ? 'No sermons' : anyBehind ? 'Behind' : 'On track';

    const sc = getScoreColor(overallScore);
    const wc = getScoreColor(weekScore);
    const outerOffset = (213.6 * (1 - overallScore / 100)).toFixed(1);
    const innerOffset = (138.2 * (1 - weekScore  / 100)).toFixed(1);
    const tooltipOuter = (138.2 * (1 - overallScore / 100)).toFixed(1);
    const tooltipInner = (138.2 * (1 - weekScore  / 100)).toFixed(1);

    const rings = `
      <div class="rings-outer-wrap">
        <div class="member-rings-wrap">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="7"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke="${sc}" stroke-width="7" stroke-linecap="round"
              stroke-dasharray="213.6 213.6" stroke-dashoffset="${outerOffset}" transform="rotate(-90 40 40)"/>
            <circle cx="40" cy="40" r="28" fill="none" stroke="#F4F2EE" stroke-width="2"/>
            <circle cx="40" cy="40" r="22" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="7"/>
            <circle cx="40" cy="40" r="22" fill="none" stroke="${wc}" stroke-width="7" stroke-linecap="round"
              stroke-dasharray="138.2 138.2" stroke-dashoffset="${innerOffset}" transform="rotate(-90 40 40)"/>
          </svg>
          <div class="score-tooltip">
            <div class="tooltip-ring">
              <div class="tooltip-ring-wrap">
                <svg width="52" height="52" viewBox="0 0 52 52">
                  <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="5"/>
                  <circle cx="26" cy="26" r="22" fill="none" stroke="${sc}" stroke-width="5" stroke-linecap="round"
                    stroke-dasharray="138.2 138.2" stroke-dashoffset="${tooltipOuter}" transform="rotate(-90 26 26)"/>
                </svg>
                <div class="tooltip-ring-center"><span class="tooltip-score" style="color:${sc};">${overallScore}</span></div>
              </div>
              <span class="tooltip-label">Overall</span>
            </div>
            <div class="tooltip-divider"></div>
            <div class="tooltip-ring">
              <div class="tooltip-ring-wrap">
                <svg width="52" height="52" viewBox="0 0 52 52">
                  <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="5"/>
                  <circle cx="26" cy="26" r="22" fill="none" stroke="${wc}" stroke-width="5" stroke-linecap="round"
                    stroke-dasharray="138.2 138.2" stroke-dashoffset="${tooltipInner}" transform="rotate(-90 26 26)"/>
                </svg>
                <div class="tooltip-ring-center"><span class="tooltip-score" style="color:${wc};">${weekScore}</span></div>
              </div>
              <span class="tooltip-label">This week</span>
            </div>
          </div>
        </div>
      </div>`;

    const behindCount = upcoming.filter(s => isSermonBehind(s, stages)).length;
    const subInfo = upcoming.length === 0
      ? 'No upcoming sermons'
      : behindCount > 0 ? `${upcoming.length} upcoming · ${behindCount} behind` : `${upcoming.length} upcoming · on track`;

    const sermonRows = upcoming.length === 0
      ? `<div class="no-sermons-msg">No upcoming sermons</div>`
      : upcoming.map(s => {
          const behind = isSermonBehind(s, stages);
          const pct = getProgressPct(s.status, statusOrder);
          const stageLabel = stages.find(st=>st.key===s.status)?.label || s.status;
          const stageClass = s.status === 'not-started' ? (behind ? 'stage-behind' : 'stage-neutral') : behind ? 'stage-behind' : 'stage-on-track';
          const progClass  = s.status === 'not-started' ? (behind ? 'behind' : 'neutral') : behind ? 'behind' : 'on-track';
          return `<div class="sermon-row" onclick="toggleSermonExpand(this)">
            <div class="sermon-row-title">${s.title||'Untitled'}${s.text ? ` <span class="sermon-row-scripture">· ${s.text}</span>` : ''}</div>
            <div class="sermon-row-meta">
              <span class="sermon-row-date">${formatDateFull(parseDate(s.date))}</span>
              <span class="sermon-row-stage ${stageClass}">${stageLabel}</span>
              ${s.context ? `<span class="sermon-row-context">${s.context}</span>` : ''}
            </div>
            <div class="sermon-row-stages" style="display:none;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);flex-wrap:wrap;align-items:center;gap:4px;">
              ${stages.filter(st=>st.key!=='not-started').map(st => {
                const idx = statusOrder.indexOf(st.key);
                const curIdx = statusOrder.indexOf(s.status);
                const isDone = idx < curIdx;
                const isCurrent = st.key === s.status;
                const isLast = idx === stages.length - 1;
                return `<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;${isDone?'text-decoration:line-through;color:var(--stone-light);':''}${isCurrent?'border:1.5px solid rgba(255,255,255,0.5);color:var(--ink);padding:1px 7px;':'color:var(--stone-light);'}">${st.label}</span>${!isLast?`<span style="font-size:10px;color:var(--stone-light);">›</span>`:''}`
              }).join('')}
            </div>
            <div class="sermon-row-progress">
              <div class="prog-bg"><div class="prog-fill ${progClass}" style="width:${pct}%"></div></div>
              <span class="prog-pct">${pct}%</span>
            </div>
          </div>`;
        }).join('');

    return `<div class="member-card ${trackClass}">
      <div class="member-header">
        ${rings}
        <div class="member-info">
          <div class="member-name">${member.name || member.email}${isYou ? '<span class="member-you">You</span>' : ''}</div>
          <div class="member-sub">${subInfo}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
          <span class="member-status-badge ${trackClass}">${trackLabel}</span>
          ${canRemove ? `<button onclick="removeMember('${team.code}','${member.uid}')" style="font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;padding:2px 0;font-family:var(--font);">Remove</button>` : ''}
        </div>
      </div>
      <div class="sermon-rows">${sermonRows}</div>
    </div>`;
  }).join('');
}

// ── REMOVE MEMBER ─────────────────────────────────────────────────────────────
window.removeMember = async (teamCode, memberUid) => {
  if (!confirm('Remove this member from the team?')) return;
  try {
    const teamSnap = await getDoc(doc(db, 'teams', teamCode));
    if (!teamSnap.exists()) return;
    const team = teamSnap.data();
    if (team.createdBy !== currentUser.uid) { alert('Only the team creator can remove members.'); return; }
    const member = team.members.find(m => m.uid === memberUid);
    if (!member) return;
    await updateDoc(doc(db, 'teams', teamCode), { members: arrayRemove(member) });
    await init();
  } catch(e) { alert('Error: ' + e.message); }
};

// ── LEAVE TEAM ────────────────────────────────────────────────────────────────
window.leaveTeam = async (teamCode) => {
  if (!confirm('Leave this team?')) return;
  try {
    const teamSnap = await getDoc(doc(db, 'teams', teamCode));
    if (teamSnap.exists()) {
      const member = teamSnap.data().members.find(m => m.uid === currentUser.uid);
      if (member) await updateDoc(doc(db, 'teams', teamCode), { members: arrayRemove(member) });
    }
    const teamsRef = doc(db, 'users', currentUser.uid, 'meta', 'teams');
    const teamsSnap = await getDoc(teamsRef);
    if (teamsSnap.exists()) {
      const codes = (teamsSnap.data().codes || []).filter(c => c !== teamCode);
      await setDoc(teamsRef, { codes });
    }
    await init();
  } catch(e) { alert('Error leaving team: ' + e.message); }
};

    <div id="drawer-avatar" style="width:32px;height:32px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;overflow:hidden;">?</div>
    <div style="flex:1;min-width:0;">
      <div id="drawer-name" style="font-size:12px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
    </div>
    <button onclick="signOut()" style="background:none;border:none;cursor:pointer;padding:6px;color:var(--stone-light);font-size:16px;border-radius:6px;display:flex;align-items:center;flex-shrink:0;" title="Sign out"><i class="ti ti-logout"></i></button>
  </div>
</div>`);
}
function injectHamburger() {
  if (window.innerWidth > 768) return;
  const topbar = document.querySelector('.topbar-wrap .topbar');
  if (topbar && !topbar.querySelector('#mobile-hamburger')) {
    const btn = document.createElement('button');
    btn.id = 'mobile-hamburger';
    btn.style.cssText = 'width:36px;height:36px;border-radius:10px;background:var(--white);border:1px solid var(--border-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;flex-shrink:0;';
    btn.innerHTML = '<div style="width:16px;height:1.5px;background:var(--ink);border-radius:2px;"></div><div style="width:16px;height:1.5px;background:var(--ink);border-radius:2px;"></div><div style="width:16px;height:1.5px;background:var(--ink);border-radius:2px;"></div>';
    btn.onclick = () => window.openMobileDrawer();
    topbar.prepend(btn);
  }
}
window.openMobileDrawer = () => {
  const d=document.getElementById('mobile-drawer'), o=document.getElementById('mobile-drawer-overlay');
  if(d) d.style.transform='translateX(0)'; if(o) o.style.display='block';
  document.body.style.overflow='hidden';
};
window.closeMobileDrawer = () => {
  const d=document.getElementById('mobile-drawer'), o=document.getElementById('mobile-drawer-overlay');
  if(d) d.style.transform='translateX(-100%)'; if(o) o.style.display='none';
  document.body.style.overflow='';
};
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { window.closeMobileDrawer(); window.closeTeamModal(); }
});
window.addEventListener('DOMContentLoaded', () => { buildMobileDrawer(); injectHamburger(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
</script>
</body>
</html>
