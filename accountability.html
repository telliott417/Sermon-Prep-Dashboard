<style>
  /* ── ACCOUNTABILITY PAGE — SPECIFIC STYLES ── */
  .main { margin-left: var(--nav-width); flex: 1; padding: 2rem 2.5rem 4rem; min-width: 0; }

  /* Button variants */
  .btn.danger { color: var(--red); border-color: var(--red-border); }
  .btn.danger:hover { background: var(--red-light); }

  /* Join / create team panel */
  .onboard-panel { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 2rem; max-width: 480px; }
  .onboard-panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .onboard-panel p { font-size: 13px; color: var(--stone); margin-bottom: 1.25rem; line-height: 1.6; }
  .onboard-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .onboard-row input { flex: 1; padding: 9px 12px; border: 1px solid var(--border-md); border-radius: var(--radius-md); background: var(--warm-bg); color: var(--ink); font-family: var(--font); font-size: 14px; outline: none; text-transform: uppercase; letter-spacing: 0.08em; }
  .onboard-row input:focus { border-color: var(--blue-text); }
  .onboard-divider { display: flex; align-items: center; gap: 10px; margin: 1.25rem 0; }
  .onboard-divider span { font-size: 12px; color: var(--stone-light); }
  .onboard-divider::before, .onboard-divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
  .onboard-error { font-size: 12px; color: var(--red); margin-top: 6px; min-height: 18px; }

  /* Team header (topbar-actions) */
  .team-code-badge { display: flex; align-items: center; gap: 8px; background: var(--white); border: 1px solid var(--border-md); border-radius: var(--radius-md); padding: 7px 14px; font-size: 13px; color: var(--stone); }
  .team-code-value { font-weight: 700; letter-spacing: 0.1em; color: var(--blue-text); }
  .copy-btn { background: none; border: none; cursor: pointer; color: var(--stone-light); font-size: 15px; padding: 2px; }
  .copy-btn:hover { color: var(--blue-text); }
  .copied-msg { font-size: 11px; color: var(--green); }

  /* Member grid */
  .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .member-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-xl); box-shadow: var(--shadow-sm); overflow: hidden; }
  .member-card.on-track   { border-top: 3px solid var(--green); }
  .member-card.behind     { border-top: 3px solid var(--red); }
  .member-card.no-sermons { border-top: 3px solid var(--stone-light); }
  .member-header { padding: 16px 18px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 14px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member-sub { font-size: 11px; color: var(--stone); margin-top: 2px; }
  .member-you { font-size: 10px; color: var(--stone-light); display: inline; margin-left: 4px; }
  .member-status-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 100px; white-space: nowrap; flex-shrink: 0; }
  .member-status-badge.on-track   { background: var(--green-light);  color: var(--green); }
  .member-status-badge.behind     { background: var(--red-light);    color: var(--red); }
  .member-status-badge.no-sermons { background: var(--warm-bg);      color: var(--stone); }

  /* Sermon rows */
  .sermon-rows { padding: 0; }
  .sermon-row { padding: 10px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .sermon-row:last-child { border-bottom: none; }
  .sermon-row:hover { background: var(--bg); }
  .sermon-row-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
  .sermon-row-scripture { font-size: 11px; color: var(--stone); font-weight: 400; }
  .sermon-row-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .sermon-row-date { font-size: 11px; color: var(--stone); }
  .sermon-row-stage { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 100px; }
  .sermon-row-context { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 100px; background: var(--warm-bg); color: var(--stone); }
  .stage-on-track { background: var(--green-light); color: var(--green); }
  .stage-behind   { background: var(--red-light);   color: var(--red); }
  .stage-neutral  { background: var(--warm-bg);     color: var(--stone); }
  .sermon-row-progress { margin-top: 6px; display: flex; align-items: center; gap: 8px; }
  .prog-bg { flex: 1; height: 3px; background: var(--warm-bg); border-radius: 2px; }
  .prog-fill { height: 3px; border-radius: 2px; }
  .prog-fill.on-track { background: var(--green); }
  .prog-fill.behind   { background: var(--red); }
  .prog-fill.neutral  { background: var(--stone-light); }
  .prog-pct { font-size: 10px; color: var(--stone-light); white-space: nowrap; }
  .no-sermons-msg { padding: 1.5rem 18px; font-size: 13px; color: var(--stone-light); text-align: center; }

  @media (max-width: 768px) {
    .main { margin-left: 0; padding: 1rem 1rem 4rem; }
    .member-grid { grid-template-columns: 1fr; }
  }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, query, where, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzrDYUgAAbGHgQmm5PxGDh1dhWqdKp-pI",
  authDomain: "sermon-prep-dashboard.firebaseapp.com",
  projectId: "sermon-prep-dashboard",
  storageBucket: "sermon-prep-dashboard.firebasestorage.app",
  messagingSenderId: "769289223341",
  appId: "1:769289223341:web:3dc1d53e57d96b3c55da24"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
let currentUser = null;

// ── SCORE COLORS ──────────────────────────────────────────────────────────────
const SCORE_COLORS = [
  {min:96,max:100,color:'#00CC55'}, {min:91,max:95,color:'#1A9A4A'},
  {min:86,max:90,color:'#2DB85C'}, {min:81,max:85,color:'#52CC6E'},
  {min:76,max:80,color:'#7DD47A'}, {min:71,max:75,color:'#C8D44A'},
  {min:66,max:70,color:'#E0C832'}, {min:61,max:65,color:'#F0A820'},
  {min:56,max:60,color:'#F08818'}, {min:51,max:55,color:'#E86818'},
  {min:46,max:50,color:'#E04C14'}, {min:41,max:45,color:'#D43010'},
  {min:0, max:40, color:'#880000'},
];
function getScoreColor(score) {
  for (const b of SCORE_COLORS) if (score >= b.min && score <= b.max) return b.color;
  return '#880000';
}
function calculateOverallScore(streakData) {
  const scores = streakData.weeklyScores || [];
  if (scores.length === 0) return 75;
  const sum = scores.reduce((acc, w) => acc + (w.score ?? 75), 0);
  return Math.round(sum / scores.length);
}
function getWeekScore(streakData) {
  const scores = streakData.weeklyScores || [];
  if (scores.length === 0) return 75;
  return scores[scores.length - 1].score ?? 75;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('nav-user').textContent = user.displayName || user.email;
    try {
      const profileSnap = await getDoc(doc(db, 'users', user.uid, 'meta', 'profile'));
      if (profileSnap.exists() && (profileSnap.data().role === 'admin' || profileSnap.data().role === 'family')) {
        document.getElementById('admin-nav-section').style.display = 'block';
      }
    } catch(e) { console.error('Role check failed:', e); }
    await init();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
  }
});

window.signIn = async () => { try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); } };
window.signOut = async () => { await fbSignOut(auth); };
window.openNav = () => { document.getElementById('main-nav').classList.add('open'); document.getElementById('nav-overlay').classList.add('open'); document.body.style.overflow='hidden'; };
window.closeNav = () => { document.getElementById('main-nav').classList.remove('open'); document.getElementById('nav-overlay').classList.remove('open'); document.body.style.overflow=''; };

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot '+state;
  document.getElementById('sync-label').textContent = label;
}

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(str) { if (!str) return null; const [y,m,d] = str.split('-').map(Number); return new Date(y,m-1,d); }
function daysUntil(d) { return Math.round((d - today()) / 86400000); }
function formatDateFull(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

function getStageDueDate(sermonDateStr, stage) {
  if (!stage || stage.dueDay === null) return null;
  const sermonDate = parseDate(sermonDateStr);
  const base = new Date(sermonDate);
  base.setDate(sermonDate.getDate() - (stage.weeksBack * 7));
  const baseDow = base.getDay();
  let diff = baseDow - stage.dueDay;
  if (diff < 0) diff += 7;
  const result = new Date(base);
  result.setDate(base.getDate() - diff);
  if (result >= sermonDate && stage.key !== 'completed' && stage.key !== 'run' && stage.key !== 'final') {
    result.setDate(result.getDate() - 7);
  }
  return result;
}

function isSermonBehind(sermon, stages) {
  if (sermon.status === 'completed') return false;
  if (sermon.status === 'not-started') {
    const firstStage = stages.find(s => s.key !== 'not-started' && s.key !== 'completed');
    if (!firstStage) return false;
    const due = getStageDueDate(sermon.date, firstStage);
    if (!due) return false;
    return daysUntil(due) < 0;
  }
  const stage = stages.find(s => s.key === sermon.status);
  if (!stage) return false;
  const due = getStageDueDate(sermon.date, stage);
  if (!due) return false;
  return daysUntil(due) < 0;
}

function getProgressPct(status, statusOrder) {
  const idx = statusOrder.indexOf(status);
  if (idx <= 0) return 0;
  if (status === 'completed') return 100;
  const totalWorkingStages = statusOrder.length - 2; // exclude not-started and completed
  const completedStages = idx - 1;
  return totalWorkingStages > 0 ? Math.round((completedStages / totalWorkingStages) * 100) : 0;
}

function calcWeekScore(sermons, stages) {
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  let deductions = 0;
  for (const s of sermons.filter(s => s.status !== 'completed' && s.date && new Date(s.date.replace(/-/g,'/')) >= todayDate)) {
    console.log('=== calcWeekScore for sermon:', s.title, '===');
    console.log('Sermon date:', s.date, 'Status:', s.status);
    const stageKeys = stages.map(st => st.key);
    const currentIdx = stageKeys.indexOf(s.status);
    for (let i = currentIdx + 1; i < stages.length - 1; i++) {
      const stage = stages[i];
      if (!stage.dueDay && stage.dueDay !== 0) continue;
      const due = getStageDueDate(s.date, stage);
      if (!due) continue;
      const diff = Math.round((due - todayDate) / 86400000);
      console.log('Stage:', stage.label, 'Due:', due ? due.toDateString() : 'null', 'Days diff:', diff, 'Deduction:', diff < 0 ? Math.min(20, 10 + (Math.abs(diff)-1)*5) : diff <= 1 ? 10 : diff === 2 ? 5 : 0);
      if (diff < 0) deductions += Math.min(20, 10 + (Math.abs(diff) - 1) * 5);
      else if (diff <= 1) deductions += 10;
      else if (diff === 2) deductions += 5;
    }
  }
  console.log('Total deductions:', deductions, 'Final score:', Math.max(0, 100 - deductions));
  return Math.max(0, 100 - deductions);
}

// ── TEAM LOGIC ────────────────────────────────────────────────────────────────
const TEAM_CODE = 'CANDEO';
const TEAM_DOC = doc(db, 'teams', TEAM_CODE);

async function init() {
  setSyncStatus('syncing', 'Loading...');
  try {
    // Check role — family members see a read-only message instead of team join
    const profileSnap = await getDoc(doc(db, 'users', currentUser.uid, 'meta', 'profile'));
    const role = profileSnap.exists() ? profileSnap.data().role : 'member';
    if (role === 'family') {
      document.getElementById('topbar-actions').innerHTML = '';
      document.getElementById('main-content').innerHTML = `
        <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:2rem;max-width:480px;">
          <div style="font-size:24px;margin-bottom:12px;">🤝</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Team Accountability</div>
          <div style="font-size:13px;color:var(--stone);line-height:1.6;">This page is for the sermon prep team. You can view the dashboard and other pages but the accountability team is for staff members only.</div>
        </div>`;
      setSyncStatus('synced', '');
      return;
    }
    const snap = await getDoc(TEAM_DOC);
    if (!snap.exists()) {
      renderOnboard(false);
    } else {
      const team = snap.data();
      const members = team.members || [];
      const isMember = members.some(m => m.uid === currentUser.uid);
      if (!isMember) {
        renderOnboard(true, team);
      } else {
        await renderTeam(team);
      }
    }
    setSyncStatus('synced', 'Synced');
  } catch(e) {
    setSyncStatus('error', 'Error');
    document.getElementById('main-content').innerHTML = `<p style="color:var(--red);font-size:13px;">Error: ${e.message}</p>`;
  }
}

window.refreshTeam = async () => { await init(); };

// ── ONBOARD ───────────────────────────────────────────────────────────────────
function renderOnboard(teamExists, team) {
  document.getElementById('topbar-actions').innerHTML = '';
  if (teamExists) {
    document.getElementById('main-content').innerHTML = `
      <div class="onboard-panel">
        <h2>Join your team</h2>
        <p>Enter the team code your team leader shared with you to join the accountability group.</p>
        <div class="onboard-row">
          <input type="text" id="join-code" placeholder="TEAM CODE" maxlength="20" />
          <button class="btn primary" onclick="joinTeam()"><i class="ti ti-arrow-right"></i> Join</button>
        </div>
        <div class="onboard-error" id="join-error"></div>
        <div class="onboard-divider"><span>or</span></div>
        <button class="btn" onclick="showCreate()"><i class="ti ti-plus"></i> Create a new team</button>
      </div>`;
  } else {
    document.getElementById('main-content').innerHTML = `
      <div class="onboard-panel">
        <h2>Join your team</h2>
        <p>Enter the team code your team leader shared with you, or create a new team.</p>
        <div class="onboard-row">
          <input type="text" id="join-code" placeholder="TEAM CODE" maxlength="20" />
          <button class="btn primary" onclick="joinTeam()"><i class="ti ti-arrow-right"></i> Join</button>
        </div>
        <div class="onboard-error" id="join-error"></div>
        <div class="onboard-divider"><span>or</span></div>
        <button class="btn" onclick="showCreate()"><i class="ti ti-plus"></i> Create a new team</button>
      </div>`;
  }
}

window.showCreate = () => {
  document.getElementById('main-content').innerHTML = `
    <div class="onboard-panel">
      <h2>Create a team</h2>
      <p>Choose a team code your staff will use to join. Keep it simple — like your church name.</p>
      <div class="onboard-row">
        <input type="text" id="create-code" placeholder="e.g. CANDEO" maxlength="20" style="text-transform:uppercase;" />
        <button class="btn primary" onclick="createTeam()"><i class="ti ti-plus"></i> Create</button>
      </div>
      <div class="onboard-error" id="create-error"></div>
      <div style="margin-top:12px;">
        <button class="btn" onclick="init()">← Back</button>
      </div>
    </div>`;
};

window.createTeam = async () => {
  const code = document.getElementById('create-code').value.trim().toUpperCase();
  const errEl = document.getElementById('create-error');
  if (!code) { errEl.textContent = 'Please enter a team code.'; return; }
  try {
    const existing = await getDoc(doc(db, 'teams', code));
    if (existing.exists()) { errEl.textContent = 'That code is already taken. Try another.'; return; }
    await setDoc(doc(db, 'teams', code), {
      code,
      createdBy: currentUser.uid,
      createdAt: new Date().toISOString(),
      members: [{ uid: currentUser.uid, name: currentUser.displayName, email: currentUser.email, photo: currentUser.photoURL || '' }]
    });
    await setDoc(doc(db, 'users', currentUser.uid, 'meta', 'team'), { code });
    await init();
  } catch(e) { errEl.textContent = 'Error: ' + e.message; }
};

window.joinTeam = async () => {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const errEl = document.getElementById('join-error');
  if (!code) { errEl.textContent = 'Please enter a team code.'; return; }
  try {
    const snap = await getDoc(doc(db, 'teams', code));
    if (!snap.exists()) { errEl.textContent = 'Team code not found. Check with your team leader.'; return; }
    const team = snap.data();
    if (team.members.some(m => m.uid === currentUser.uid)) { errEl.textContent = 'You are already in this team.'; return; }
    await updateDoc(doc(db, 'teams', code), {
      members: arrayUnion({ uid: currentUser.uid, name: currentUser.displayName, email: currentUser.email, photo: currentUser.photoURL || '' })
    });
    await setDoc(doc(db, 'users', currentUser.uid, 'meta', 'team'), { code });
    await init();
  } catch(e) { errEl.textContent = 'Error: ' + e.message; }
};

// ── RENDER TEAM ───────────────────────────────────────────────────────────────
async function renderTeam(team) {
  const members = team.members || [];
  const content = document.getElementById('main-content');

  // Populate topbar-actions with refresh, team code badge, leave team
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn" onclick="refreshTeam()"><i class="ti ti-refresh"></i> Refresh</button>
    <div class="team-code-badge">
      Team: <span class="team-code-value">${team.code}</span>
      <button class="copy-btn" onclick="copyCode('${team.code}')" title="Copy code"><i class="ti ti-copy"></i></button>
      <span class="copied-msg" id="copied-msg"></span>
    </div>
    <button class="btn danger" onclick="leaveTeam()"><i class="ti ti-logout"></i> Leave team</button>`;

  content.innerHTML = `
    <div id="team-score-card"></div>
    <div class="section-header">
      <div class="section-title">Team members</div>
      <div class="section-line"></div>
      <div class="section-count">${members.length}</div>
    </div>
    <div class="member-grid" id="member-grid">
      <div class="loading-state"><i class="ti ti-loader"></i>Loading member data...</div>
    </div>`;

  // Load each member's sermons, settings, and streak_data
  const memberData = await Promise.all(members.map(async member => {
    try {
      const [sermonsSnap, settingsSnap, streakSnap] = await Promise.all([
        getDocs(collection(db, 'users', member.uid, 'sermons')),
        getDoc(doc(db, 'users', member.uid, 'meta', 'settings')),
        getDoc(doc(db, 'users', member.uid, 'meta', 'streak_data'))
      ]);
      const sermons = sermonsSnap.docs.map(d => ({id: d.id, ...d.data()}));
      const settings = settingsSnap.exists() ? settingsSnap.data() : null;
      const stages = settings?.stages ? [
        {key:'not-started',label:'Not yet started',dueDay:null,weeksBack:null},
        ...settings.stages,
        {key:'completed',label:'Completed',dueDay:0,weeksBack:0}
      ] : [
        {key:'not-started',label:'Not yet started',dueDay:null,weeksBack:null},
        {key:'study',label:'Study',dueDay:2,weeksBack:2},
        {key:'idea',label:'Main idea',dueDay:2,weeksBack:2},
        {key:'outline',label:'Outline',dueDay:3,weeksBack:2},
        {key:'draft',label:'Draft',dueDay:2,weeksBack:1},
        {key:'final',label:'Final',dueDay:3,weeksBack:1},
        {key:'run',label:'Run-through',dueDay:4,weeksBack:1},
        {key:'completed',label:'Completed',dueDay:0,weeksBack:0}
      ];
      const statusOrder = stages.map(s=>s.key);
      const streakData = streakSnap.exists() ? streakSnap.data() : {};
      const overallScore = calculateOverallScore(streakData);
      const weekScore = calcWeekScore(sermons, stages);
      return { member, sermons, stages, statusOrder, overallScore, weekScore };
    } catch(e) {
      return { member, sermons: [], stages: [], statusOrder: [], overallScore: 75, weekScore: 75 };
    }
  }));

  // Sort members: those with upcoming sermons first (by nearest date), then those without
  memberData.sort((a, b) => {
    const aNext = a.sermons
      .filter(s => s.status !== 'completed' && daysUntil(parseDate(s.date)) >= 0)
      .sort((x,y) => x.date.localeCompare(y.date))[0];
    const bNext = b.sermons
      .filter(s => s.status !== 'completed' && daysUntil(parseDate(s.date)) >= 0)
      .sort((x,y) => x.date.localeCompare(y.date))[0];
    if (aNext && bNext) return aNext.date.localeCompare(bNext.date);
    if (aNext) return -1;
    if (bNext) return 1;
    return 0;
  });

  // ── TEAM SCORE CARD ──────────────────────────────────────────────────────────
  const avgOverall = Math.round(memberData.reduce((sum, d) => sum + d.overallScore, 0) / memberData.length);
  const avgWeek    = Math.round(memberData.reduce((sum, d) => sum + d.weekScore,    0) / memberData.length);
  const avgOC = getScoreColor(avgOverall);
  const avgWC = getScoreColor(avgWeek);
  const avgOuterOff = (276.5 * (1 - avgOverall / 100)).toFixed(1);
  const avgWeekOff  = (276.5 * (1 - avgWeek    / 100)).toFixed(1);

  const makeTeamRing = (score, color, offset) => `
    <div style="position:relative;width:100px;height:100px;flex-shrink:0;">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="9"/>
        <circle cx="50" cy="50" r="44" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
          stroke-dasharray="276.5 276.5" stroke-dashoffset="${offset}" transform="rotate(-90 50 50)"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
        <span style="font-size:22px;font-weight:800;color:${color};">${score}</span>
      </div>
    </div>`;

  const makeMemberDot = (d, scoreType) => {
    const score = scoreType === 'overall' ? d.overallScore : d.weekScore;
    const color = getScoreColor(score);
    const dotOffset = (69.1 * (1 - score / 100)).toFixed(1);
    const firstName = (d.member.name || d.member.email || '?').split(' ')[0];
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;" title="${firstName}: ${score}">
        <div style="position:relative;width:28px;height:28px;">
          <svg width="28" height="28" viewBox="0 0 28 28">
            <circle cx="14" cy="14" r="11" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="3"/>
            <circle cx="14" cy="14" r="11" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round"
              stroke-dasharray="69.1 69.1" stroke-dashoffset="${dotOffset}" transform="rotate(-90 14 14)"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
            <span style="font-size:7px;font-weight:700;color:${color};">${score}</span>
          </div>
        </div>
        <span style="font-size:9px;color:var(--stone);max-width:28px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${firstName}</span>
      </div>`;
  };

  document.getElementById('team-score-card').innerHTML = `
    <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);padding:22px 28px;margin-bottom:16px;">
      <div style="display:grid;grid-template-columns:1fr 1px 1fr;gap:24px;align-items:center;">
        <div style="display:flex;align-items:center;gap:20px;">
          ${makeTeamRing(avgOverall, avgOC, avgOuterOff)}
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--ink);">${team.code} Team</div>
            <div style="font-size:11px;color:var(--stone);margin-top:2px;">Average overall prep score</div>
            <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
              ${memberData.map(d => makeMemberDot(d, 'overall')).join('')}
            </div>
          </div>
        </div>
        <div style="width:1px;height:80px;background:var(--border);margin:auto;"></div>
        <div style="display:flex;align-items:center;gap:20px;">
          ${makeTeamRing(avgWeek, avgWC, avgWeekOff)}
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--ink);">${team.code} Team</div>
            <div style="font-size:11px;color:var(--stone);margin-top:2px;">Resets every Monday</div>
            <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
              ${memberData.map(d => makeMemberDot(d, 'week')).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('member-grid').innerHTML = memberData.map(({member, sermons, stages, statusOrder, overallScore, weekScore}) => {
    const isYou = member.uid === currentUser.uid;
    const upcoming = sermons
      .filter(s => s.status !== 'completed' && daysUntil(parseDate(s.date)) >= 0)
      .sort((a,b) => a.date.localeCompare(b.date))
      .slice(0, 3);

    const anyBehind = upcoming.some(s => isSermonBehind(s, stages));
    const trackClass = upcoming.length === 0 ? 'no-sermons' : anyBehind ? 'behind' : 'on-track';
    const trackLabel = upcoming.length === 0 ? 'No sermons' : anyBehind ? 'Behind' : 'On track';

    // Score rings
    const sc = getScoreColor(overallScore);
    const wc = getScoreColor(weekScore);
    const outerOffset = (150.8 * (1 - overallScore / 100)).toFixed(1);
    const innerOffset = (94.2  * (1 - weekScore  / 100)).toFixed(1);
    const rings = `
      <div class="member-rings-wrap" style="position:relative;width:56px;height:56px;flex-shrink:0;">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="5"/>
          <circle cx="28" cy="28" r="24" fill="none" stroke="${sc}" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="150.8 150.8" stroke-dashoffset="${outerOffset}" transform="rotate(-90 28 28)"/>
          <circle cx="28" cy="28" r="19" fill="none" stroke="#F4F2EE" stroke-width="1.5"/>
          <circle cx="28" cy="28" r="15" fill="none" stroke="rgba(20,18,16,0.07)" stroke-width="4"/>
          <circle cx="28" cy="28" r="15" fill="none" stroke="${wc}" stroke-width="4" stroke-linecap="round"
            stroke-dasharray="94.2 94.2" stroke-dashoffset="${innerOffset}" transform="rotate(-90 28 28)"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
          <span style="font-size:13px;font-weight:800;color:${sc};">${overallScore}</span>
        </div>
      </div>`;

    // Member subtitle: sermon count + status summary
    const behindCount = upcoming.filter(s => isSermonBehind(s, stages)).length;
    const subInfo = upcoming.length === 0
      ? 'No upcoming sermons'
      : behindCount > 0
        ? `${upcoming.length} upcoming · ${behindCount} behind`
        : `${upcoming.length} upcoming · on track`;

    const sermonRows = upcoming.length === 0
      ? `<div class="no-sermons-msg">No upcoming sermons</div>`
      : upcoming.map(s => {
          const behind = isSermonBehind(s, stages);
          const pct = getProgressPct(s.status, statusOrder);
          const stageLabel = stages.find(st=>st.key===s.status)?.label || s.status;
          const stageClass = s.status === 'not-started'
            ? (behind ? 'stage-behind' : 'stage-neutral')
            : behind ? 'stage-behind' : 'stage-on-track';
          const progClass = s.status === 'not-started'
            ? (behind ? 'behind' : 'neutral')
            : behind ? 'behind' : 'on-track';
          return `<div class="sermon-row" onclick="toggleSermonExpand(this)" style="cursor:pointer;">
            <div class="sermon-row-title">${s.title||'Untitled'}${s.text ? ` <span class="sermon-row-scripture">· ${s.text}</span>` : ''}</div>
            <div class="sermon-row-meta">
              <span class="sermon-row-date">${formatDateFull(parseDate(s.date))}</span>
              <span class="sermon-row-stage ${stageClass}">${stageLabel}</span>
              ${s.context ? `<span class="sermon-row-context">${s.context}</span>` : ''}
            </div>
            <div class="sermon-row-stages" style="display:none;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);display:none;flex-wrap:wrap;align-items:center;gap:4px;">
              ${stages.filter(st=>st.key!=='not-started').map(st => {
                const idx = statusOrder.indexOf(st.key);
                const currentIdx = statusOrder.indexOf(s.status);
                const isDone = idx < currentIdx;
                const isCurrent = st.key === s.status;
                const isLast = idx === stages.length - 1;
                return `<span style="font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;${isDone?'text-decoration:line-through;color:var(--stone-light);':''}${isCurrent?'border:1.5px solid rgba(255,255,255,0.5);color:var(--ink);padding:1px 7px;':'color:var(--stone-light);'}">${st.label}</span>${!isLast?`<span style="font-size:10px;color:var(--stone-light);">›</span>`:''}`
              }).join('')}
            </div>
            <div class="sermon-row-progress">
              <div class="prog-bg"><div class="prog-fill ${progClass}" style="width:${pct}%"></div></div>
              <span class="prog-pct">${pct}%</span>
            </div>
          </div>`;
        }).join('');

    return `<div class="member-card ${trackClass}">
      <div class="member-header">
        ${rings}
        <div class="member-info">
          <div class="member-name">${member.name || member.email}${isYou ? '<span class="member-you">You</span>' : ''}</div>
          <div class="member-sub">${subInfo}</div>
        </div>
        <span class="member-status-badge ${trackClass}">${trackLabel}</span>
      </div>
      <div class="sermon-rows">${sermonRows}</div>
    </div>`;
  }).join('');
}

window.copyCode = (code) => {
  navigator.clipboard.writeText(code);
  const el = document.getElementById('copied-msg');
  el.textContent = 'Copied!';
  setTimeout(() => { el.textContent = ''; }, 2000);
};

window.leaveTeam = async () => {
  if (!confirm('Leave this team? You can rejoin with the team code.')) return;
  try {
    const teamSnap = await getDoc(doc(db, 'users', currentUser.uid, 'meta', 'team'));
    if (teamSnap.exists()) {
      const code = teamSnap.data().code;
      const teamDoc = await getDoc(doc(db, 'teams', code));
      if (teamDoc.exists()) {
        const member = teamDoc.data().members.find(m => m.uid === currentUser.uid);
        if (member) await updateDoc(doc(db, 'teams', code), { members: arrayRemove(member) });
      }
    }
    await setDoc(doc(db, 'users', currentUser.uid, 'meta', 'team'), {});
    await init();
  } catch(e) { alert('Error leaving team: ' + e.message); }
};

window.toggleSermonExpand = function(row) {
  const stagesEl = row.querySelector('.sermon-row-stages');
  const isOpen = stagesEl.style.display === 'flex';
  // Close all open ones first
  document.querySelectorAll('.sermon-row-stages').forEach(el => el.style.display = 'none');
  // Open this one if it wasn't already open
  if (!isOpen) stagesEl.style.display = 'flex';
};

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
document.addEventListener('keydown', e => { if(e.key==='Escape') window.closeNav(); });
</script>
</body>
</html>
