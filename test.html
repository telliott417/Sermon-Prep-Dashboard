<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Firebase Test</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; }
  button { padding: 10px 20px; margin: 8px 4px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .btn-google { background: #4285f4; color: white; }
  .btn-signout { background: #f0f0ef; color: #333; }
  .btn-test { background: #eaf3de; color: #3b6d11; }
  .status { margin: 1rem 0; padding: 12px; border-radius: 8px; background: #f5f5f4; font-size: 13px; line-height: 1.6; }
  .success { background: #eaf3de; color: #3b6d11; }
  .error { background: #fcebeb; color: #a32d2d; }
  h2 { font-size: 18px; margin-bottom: 1rem; }
</style>
</head>
<body>

<h2>🔥 Firebase Test</h2>

<div id="auth-section">
  <button class="btn-google" onclick="signIn()">Sign in with Google</button>
</div>

<div id="user-section" style="display:none;">
  <div class="status success" id="user-info"></div>
  <button class="btn-test" onclick="testWrite()">Test write to Firestore</button>
  <button class="btn-test" onclick="testRead()">Test read from Firestore</button>
  <button class="btn-signout" onclick="signOut()">Sign out</button>
</div>

<div id="status-log"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzrDYUgAAbGHgQmm5PxGDh1dhWqdKp-pI",
  authDomain: "sermon-prep-dashboard.firebaseapp.com",
  projectId: "sermon-prep-dashboard",
  storageBucket: "sermon-prep-dashboard.firebasestorage.app",
  messagingSenderId: "769289223341",
  appId: "1:769289223341:web:3dc1d53e57d96b3c55da24"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

function log(msg, type='') {
  const el = document.getElementById('status-log');
  el.innerHTML += `<div class="status ${type}">${msg}</div>`;
}

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('user-section').style.display = 'block';
    document.getElementById('user-info').textContent = `✓ Signed in as ${user.displayName} (${user.email})\nUID: ${user.uid}`;
    log(`Auth working ✓ — welcome ${user.displayName}`, 'success');
  } else {
    document.getElementById('auth-section').style.display = 'block';
    document.getElementById('user-section').style.display = 'none';
  }
});

window.signIn = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    log(`Sign-in error: ${e.message}`, 'error');
  }
};

window.signOut = async () => {
  await fbSignOut(auth);
  log('Signed out.');
};

window.testWrite = async () => {
  try {
    const user = auth.currentUser;
    await setDoc(doc(db, 'users', user.uid, 'test', 'hello'), {
      message: 'Firebase is working!',
      timestamp: new Date().toISOString()
    });
    log('Write successful ✓', 'success');
  } catch(e) {
    log(`Write error: ${e.message}`, 'error');
  }
};

window.testRead = async () => {
  try {
    const user = auth.currentUser;
    const snap = await getDoc(doc(db, 'users', user.uid, 'test', 'hello'));
    if (snap.exists()) {
      log(`Read successful ✓ — data: ${JSON.stringify(snap.data())}`, 'success');
    } else {
      log('No data found — try writing first.', 'error');
    }
  } catch(e) {
    log(`Read error: ${e.message}`, 'error');
  }
};
</script>
</body>
</html>
